<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>WorkSync Pro - 근무상황 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      font-size: 1.1rem; 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    input, select, button, textarea { min-height: 44px; }

  </style>
</head>
<body class="bg-slate-50 text-slate-700 selection:bg-blue-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // --- 에러 바운더리 ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-white p-4">
              <div className="max-w-lg w-full p-10 text-center border border-slate-200 rounded-[2.5rem] shadow-2xl">
                <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-8"></i>
                <h2 className="text-3xl font-semibold text-slate-900 mb-4">데이터 로드 오류</h2>
                <p className="text-slate-500 mb-10 leading-relaxed text-lg font-medium">설정 충돌이 발생했습니다. 초기화 후 다시 시도해 주세요.</p>
                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-slate-800 transition-custom text-xl shadow-xl active:scale-95">설정 및 데이터 초기화</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Gemini API 연동 ---
    const GEMINI_MODEL = "gemini-2.5-flash"; 
    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = localStorage.getItem('gemini_api_key') || "";
      if (!apiKey) throw new Error('API_KEY_MISSING');
      
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction || "School admin expert." }] }
      };
      
      const maxRetries = 5;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || "API 호출 중 에러가 발생했습니다.");
          }
          
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
          
        } catch (error) {
          if (i === maxRetries - 1) {
            if (error.message.includes("high demand") || error.message.includes("overloaded") || error.message.includes("503")) {
              throw new Error("현재 구글 AI 서버의 사용량이 많아 접속이 지연되고 있습니다. 잠시 후 다시 시도해 주세요.");
            }
            throw error;
          }
          const delay = Math.pow(2, i) * 1000;
          await new Promise(res => setTimeout(res, delay));
        }
      }
    };

    // --- Utilities ---
    const formatDate = (date) => {
      if (!date || !(date instanceof Date) || isNaN(date)) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    };

    const formatTime = (date) => {
      if (!date || !(date instanceof Date) || isNaN(date)) return "";
      return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    };

    const clampDate = (date, year) => {
        const isMidnight = date.getHours() === 0 && date.getMinutes() === 0;
        const startOfYearMidnight = new Date(year, 0, 1, 0, 0, 0);
        const startOfYearWork = new Date(year, 0, 1, 9, 0, 0);
        const endOfYearMidnight = new Date(year, 11, 31, 0, 0, 0);
        const endOfYearWork = new Date(year, 11, 31, 17, 0, 0);
        
        if (date < startOfYearMidnight) return isMidnight ? startOfYearMidnight : startOfYearWork;
        if (date > new Date(year, 11, 31, 23, 59, 59)) return isMidnight ? endOfYearMidnight : endOfYearWork;
        
        return date;
    };

    const getMonthsDays = (totalDays) => {
        const m = Math.floor(totalDays / 30);
        const d = totalDays % 30;
        if (m > 0 && d === 0) return `${m}개월`;
        if (m > 0) return `${m}개월 ${d}일`;
        return `${d}일`;
    };

    const getDurationMins = (start, end) => {
      if (!(start instanceof Date) || !(end instanceof Date) || isNaN(start.getTime()) || isNaN(end.getTime())) return 0;
      const ms = end.getTime() - start.getTime();
      if (ms < 0) return 0;
      
      const startIsMidnight = start.getHours() === 0 && start.getMinutes() === 0;
      const endIsMidnight = end.getHours() === 0 && end.getMinutes() === 0;

      if (startIsMidnight && endIsMidnight) {
          return (Math.round(ms / 86400000) + 1) * 480; 
      }
      
      if (formatDate(start) === formatDate(end)) {
          return Math.floor(ms / 60000); 
      }

      const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      const endDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());
      const daysSpanned = Math.round((endDay.getTime() - startDay.getTime()) / 86400000) + 1;
      
      let totalMins = 0;
      for (let i = 0; i < daysSpanned; i++) {
          if (i === 0) {
              const endOfFirstDay = new Date(start.getFullYear(), start.getMonth(), start.getDate(), 17, 0);
              const diff = endOfFirstDay.getTime() - start.getTime();
              totalMins += diff > 0 ? Math.floor(diff / 60000) : 0;
          } else if (i === daysSpanned - 1) {
              const startOfLastDay = new Date(end.getFullYear(), end.getMonth(), end.getDate(), 9, 0);
              const diff = end.getTime() - startOfLastDay.getTime();
              totalMins += diff > 0 ? Math.floor(diff / 60000) : 0;
          } else {
              totalMins += 480;
          }
      }
      return totalMins; 
    };

    const needsAttachment = (type, originalStatus = '', details = '') => {
        if (type === '공가') return true;
        if (type === '특별휴가') {
            const combined = String(originalStatus) + ' ' + String(details);
            return combined.includes('가족돌봄') || combined.includes('경조사');
        }
        return false;
    };

    const formatDur = (totalMins) => {
      if (!totalMins || totalMins <= 0) return "0일 0시간 0분";
      const d = Math.floor(totalMins / 480);
      const h = Math.floor((totalMins % 480) / 60);
      const m = totalMins % 60;
      return `${d}일 ${h}시간 ${m}분`;
    };

    const getDurationString = (start, end) => {
      return formatDur(getDurationMins(start, end));
    };

    const parseCSVLine = (line) => {
      const result = []; let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else current += char;
      }
      result.push(current.trim());
      return result;
    };

    const escapeCSV = (str) => {
      if (str == null) return '""';
      const s = String(str).replace(/"/g, '""');
      return `"${s}"`;
    };

    const normalizePosition = (pos) => {
      if (!pos) return '-';
      let p = String(pos).trim();
      return p.replace(/초등학교장/g, '교장')
              .replace(/초등학교교감/g, '교감')
              .replace(/초등학교교사/g, '교사')
              .replace(/특수학교교사/g, '특수교사');
    };

    const getPositionWeight = (position) => {
      if (!position) return 99;
      const p = position.trim();
      
      if (p.includes('교장')) return 1;
      if (p.includes('교감')) return 2;
      if (p.includes('실무원') || p.includes('상담사') || p.includes('공무직') || p.includes('조리사') || p.includes('조리원')) return 8;
      if (p.includes('특수교사') || p.includes('보건교사') || p.includes('영양교사') || p.includes('사서교사') || p.includes('상담교사')) return 4;
      if (p.includes('교사')) return 3;
      if (p.includes('행정실장')) return 5;
      if (p.includes('지방교육행정주사') || p.includes('주무관')) return 6;
      if (/\d+급/.test(p)) return 7;
      
      return 10;
    };

    const getTypeWeight = (type) => {
      switch (type) {
        case '연가': return 1;
        case '병가': return 2;
        case '공가': return 3;
        case '특별휴가': return 4;
        case '41조': return 5;
        case '출장': return 6;
        case '기타': return 7;
        case '조퇴': return 8;
        case '외출': return 9;
        default: return 99;
      }
    };

    const normalizeType = (status) => {
      if (!status) return '기타';
      const s = String(status).replace(/\s/g, '');
      if (s.includes('41조')) return '41조';
      if (s.includes('특별휴가') || s.includes('경조사') || s.includes('출산') || s.includes('난임') || s.includes('보건휴가') || s.includes('모성보호') || s.includes('육아시간') || s.includes('장기재직') || s.includes('수업휴가') || s.includes('재해구호') || s.includes('포상') || s.includes('가족돌봄') || s.includes('임신검진') || s.includes('교육활동')) return '특별휴가';
      if (s.includes('연가') || s.includes('휴가')) return '연가';
      if (s.includes('병가') || s.includes('병조퇴')) return '병가';
      if (s.includes('출장')) return '출장';
      if (s.includes('조퇴')) return '조퇴';
      if (s.includes('외출')) return '외출';
      if (s.includes('공가')) return '공가';
      if (s.includes('정상')) return '정상근무';
      return '기타';
    };

    const TYPE_COLORS = {
      '연가': 'bg-blue-50 text-blue-600 border-blue-100',
      '병가': 'bg-red-50 text-red-600 border-red-100',
      '공가': 'bg-purple-50 text-purple-600 border-purple-100',
      '특별휴가': 'bg-pink-50 text-pink-600 border-pink-100',
      '41조': 'bg-teal-50 text-teal-600 border-teal-100',
      '출장': 'bg-emerald-50 text-emerald-600 border-emerald-100',
      '조퇴': 'bg-amber-50 text-amber-600 border-amber-100',
      '외출': 'bg-orange-50 text-orange-600 border-orange-100',
      '정상근무': 'bg-slate-50 text-slate-400 border-slate-100'
    };

    const CALENDAR_COLORS = {
      '연가': 'bg-blue-500', '병가': 'bg-red-500', '공가': 'bg-purple-500', '특별휴가': 'bg-pink-500', '41조': 'bg-teal-500', '출장': 'bg-emerald-500', '조퇴': 'bg-amber-500', '외출': 'bg-orange-500', '기타': 'bg-slate-400'
    };

    const WORK_TYPES = ['연가', '병가', '공가', '특별휴가', '41조', '조퇴', '외출', '출장', '기타'];

    // --- Main Component ---
    function App() {
      const [viewMode, setViewMode] = useState('calendar');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [mngYear, setMngYear] = useState(new Date().getFullYear());
      
      const [departments, setDepartments] = useState(() => {
        try { return JSON.parse(localStorage.getItem('work_schedule_departments')) || ['마산중앙초등학교']; } 
        catch(e) { return ['마산중앙초등학교']; }
      });
      const [staff, setStaff] = useState(() => {
        try { return JSON.parse(localStorage.getItem('work_schedule_staff')) || []; } 
        catch(e) { return []; }
      });
      
      const [events, setEvents] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_events');
          if (!saved) return [];
          return JSON.parse(saved).map(e => ({ 
            ...e, 
            start: new Date(e.start), 
            end: new Date(e.end),
            hasAttachment: !!e.hasAttachment
          })).filter(e => !isNaN(e.start.getTime())); 
        } catch(err) { return []; }
      });

      const [listSearchName, setListSearchName] = useState('');
      const [listSearchType, setListSearchType] = useState('전체');
      const [listSearchStartDate, setListSearchStartDate] = useState('');
      const [listSearchEndDate, setListSearchEndDate] = useState('');
      const [appliedFilter, setAppliedFilter] = useState({ name: '', type: '전체', start: '', end: '' });
      const listNameInputRef = useRef(null);

      const [orgSelectedDate, setOrgSelectedDate] = useState(formatDate(new Date()));
      const [orgFilterStatus, setOrgFilterStatus] = useState('전체');
      const [deptFilters, setDeptFilters] = useState({});

      const [settingsNewDept, setSettingsNewDept] = useState('');
      const [settingsNewStaff, setSettingsNewStaff] = useState({ name: '', position: '', department: '' });
      const [settingsEditingStaffId, setSettingsEditingStaffId] = useState(null);
      const [settingsEditStaffData, setSettingsEditStaffData] = useState({ name: '', position: '' });
      const [settingsGeminiKey, setSettingsGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');

      const [aiReport, setAiReport] = useState("");
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncMessage, setSyncMessage] = useState('');
      const [dailyPreviewData, setDailyPreviewData] = useState([]);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [uploadSubTab, setUploadSubTab] = useState('daily');

      const [globalAlert, setGlobalAlert] = useState({ isOpen: false, message: '', align: 'center', title: null });
      const [globalConfirm, setGlobalConfirm] = useState({ isOpen: false, message: '', onConfirm: null });

      const fileInputRef = useRef(null);
      const backupFileInputRef = useRef(null);

      // 💡 로컬 스토리지 업데이트 최적화 (의존성 분리)
      useEffect(() => { localStorage.setItem('work_schedule_departments', JSON.stringify(departments)); }, [departments]);
      useEffect(() => { localStorage.setItem('work_schedule_staff', JSON.stringify(staff)); }, [staff]);
      useEffect(() => { localStorage.setItem('work_schedule_events', JSON.stringify(events)); }, [events]);

      // 💡 모달 활성화 시 배경 스크롤 고정
      useEffect(() => {
        if (isModalOpen || globalAlert.isOpen || globalConfirm.isOpen) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = 'unset';
        }
        return () => { document.body.style.overflow = 'unset'; }
      }, [isModalOpen, globalAlert.isOpen, globalConfirm.isOpen]);

      useEffect(() => {
        if (departments.length > 0 && !settingsNewStaff.department) {
          setSettingsNewStaff(prev => ({ ...prev, department: departments[0] }));
        }
      }, [departments]);

      const showAlert = (message, align = 'center', title = null) => setGlobalAlert({ isOpen: true, message, align, title });
      const showConfirm = (message, onConfirm) => setGlobalConfirm({ isOpen: true, message: String(message), onConfirm });

      const [newEvent, setNewEvent] = useState({ id: null, name: '', type: '연가', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', details: '', hasAttachment: false, originalStatus: '' });

      const toggleAttachment = (id) => {
        setEvents(prev => prev.map(e => e.id === id ? { ...e, hasAttachment: !e.hasAttachment } : e));
      };

      const handleSelectEvent = useCallback((event) => {
        const durationStr = getDurationString(event.start, event.end);
        const currentStaff = staff.find(s => s.name === event.name);
        const position = currentStaff ? currentStaff.position : (event.position || '-');
        
        const isSameDay = formatDate(event.start) === formatDate(event.end);
        
        const detailNode = (
            <div className="flex flex-col w-full text-center px-1">
                <div className="flex flex-row items-center justify-center border-b border-slate-200 pb-5 mb-5 gap-3 w-full">
                    <span className="text-[13px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-lg border border-slate-200 tracking-tight">{position}</span>
                    <span className="text-[22px] font-black text-slate-800 tracking-tight">{event.name}</span>
                </div>
                
                <div className="flex flex-col space-y-4 text-left w-full">
                    <div className="flex items-center gap-4">
                        <span className="w-20 shrink-0 text-sm font-bold text-slate-400 text-center">근무상황</span>
                        <span className={`inline-flex items-center px-3 py-1.5 rounded-lg border text-[17px] font-bold shadow-sm ${TYPE_COLORS[event.type] || 'bg-slate-50 text-slate-600'}`}>
                            {event.originalStatus || event.type}
                        </span>
                    </div>
                    
                    <div className="flex items-center gap-4 bg-blue-50/80 p-4 rounded-xl border border-blue-200 shadow-inner">
                        <span className="w-16 shrink-0 text-sm font-black text-blue-500 text-center">일시</span>
                        <div className="tracking-tight flex flex-col gap-1">
                            {isSameDay ? (
                                <>
                                    <span className="text-[17px] font-black text-blue-800">{formatDate(event.start)}</span>
                                    <span className="text-[15px] font-bold text-blue-600">{formatTime(event.start)} ~ {formatTime(event.end)}</span>
                                </>
                            ) : (
                                <>
                                    <div className="flex items-baseline gap-1.5">
                                        <span className="text-[17px] font-black text-blue-800">{formatDate(event.start)}</span>
                                        <span className="text-[15px] font-bold text-blue-600">{formatTime(event.start)}</span>
                                    </div>
                                    <div className="flex items-baseline gap-1.5">
                                        <span className="text-[15px] font-bold text-blue-600">~</span>
                                        <span className="text-[17px] font-black text-blue-800">{formatDate(event.end)}</span>
                                        <span className="text-[15px] font-bold text-blue-600">{formatTime(event.end)}</span>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                    
                    <div className="flex items-center gap-4">
                        <span className="w-20 shrink-0 text-sm font-bold text-slate-400 text-center">일수/기간</span>
                        <span className="text-[15px] font-bold text-slate-700">{durationStr}</span>
                    </div>
                    
                    <div className="flex items-start gap-4">
                        <span className="w-20 shrink-0 text-sm font-bold text-slate-400 mt-0.5 text-center">사유/용무</span>
                        <span className="text-[15px] font-bold text-slate-700 break-all leading-snug">{event.details || '-'}</span>
                    </div>
                    
                    {needsAttachment(event.type, event.originalStatus, event.details) && (
                        <div className="flex items-center gap-4">
                            <span className="w-20 shrink-0 text-sm font-bold text-slate-400 text-center">증빙서류</span>
                            <span className={event.hasAttachment ? 'text-[15px] text-emerald-600 font-bold' : 'text-[15px] text-red-500 font-bold'}>
                                {event.hasAttachment ? '제출 확인됨' : '미제출 상태'}
                            </span>
                        </div>
                    )}
                </div>
            </div>
        );

        showAlert(detailNode, 'center', '근무상황 상세조회');
      }, [staff]);

      const handleSubmit = (e) => {
        e.preventDefault();
        const createSafeDate = (dStr, tStr) => {
          try {
            const ds = dStr || formatDate(new Date());
            const ts = tStr || '00:00';
            const [y, m, d] = ds.split('-').map(Number);
            const [hr, min] = ts.split(':').map(Number);
            const parsedDate = new Date(y, m - 1, d, hr, min);
            return isNaN(parsedDate.getTime()) ? new Date() : parsedDate;
          } catch(err) {
            return new Date();
          }
        };

        const startDateTime = createSafeDate(newEvent.date, newEvent.startTime);
        const endDateTime = createSafeDate(newEvent.date, newEvent.endTime);
        const displayName = String(newEvent.name || '본인').trim();
        
        const existingStaff = staff.find(s => s.name === displayName);
        const pos = existingStaff ? existingStaff.position : '-';

        const newEventObj = {
          id: newEvent.id || Date.now() + Math.random(), 
          name: String(displayName), 
          position: String(pos),
          title: String(`[${displayName}] ${newEvent.type}`),
          start: startDateTime, 
          end: endDateTime, 
          type: String(newEvent.type),
          originalStatus: String(newEvent.originalStatus || newEvent.type),
          details: String(newEvent.details || ''),

            const approvalIdx = headers.findIndex(h => h.includes('승인') || h.includes('결재') || h.includes('상태'));

            if (uploadSubTab === 'daily') {
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const obj = {}; headers.forEach((h, idx) => obj[h] = cur[idx] || '');
                const appStatus = approvalIdx !== -1 ? (cur[approvalIdx] || '') : '완결';

                  const attachVal = attachIdx !== -1 ? (cur[attachIdx] || '') : '';

                  parsed.push({ name: obj['성명'].trim(), status: obj['근무상황'], period: obj['기간'], reason: obj['사유'] || '-', department: dept, position: pos, hasAttachment });
                }
              });
            } else {
              const nIdx = headers.findIndex(h => h.includes('성명')), pIdx = headers.findIndex(h => h.includes('기간')), tIdx = headers.findIndex(h => h.includes('종별')), rIdx = headers.findIndex(h => h.includes('사유')), dIdx = headers.findIndex(h => h.includes('부서명')), posIdx = headers.findIndex(h => h.includes('직급'));
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const rawN = cur[nIdx] || '', name = rawN.split(/[\r\n(]/)[0].trim(), status = cur[tIdx] || '';
                const appStatus = approvalIdx !== -1 ? (cur[approvalIdx] || '') : '완결';

      const handleApplyUpdates = () => {
        const existingNames = new Set(staff.map(s => s.name));
        const newOnes = [];
        let updatedDepts = [...departments];

        dailyPreviewData.forEach(p => {
          if (!existingNames.has(p.name)) {
            let targetDept = (p.department && String(p.department).trim() !== '' && p.department !== '-') ? String(p.department).trim() : updatedDepts[0];
            if (!updatedDepts.includes(targetDept)) {
                updatedDepts.push(targetDept);
            }
            
            newOnes.push({ 
                id: (Date.now() + Math.random()).toString(36), 
                name: p.name, 
                position: normalizePosition(p.position), 
                department: targetDept 
            });
            existingNames.add(p.name);
          }
        });
        
        const apply = () => {
          if (updatedDepts.length > departments.length) {
              setDepartments(updatedDepts);
          }
          const robustParse = (str) => {
              const m = String(str || '').match(/\d+/g);
              if (m && m.length >= 3) return new Date(m[0], m[1]-1, m[2], m[3]||0, m[4]||0);
              return null;
          };
          const parseRange = (ps) => {
              if(!ps) return { start: new Date(), end: new Date() };
              const parts = String(ps).split('~').map(s => s.trim());
              const s = robustParse(parts[0]);
              const e = parts[1] ? robustParse(parts[1]) : s;
              return { start: s || new Date(), end: e || new Date() };
          };

          const newEvents = dailyPreviewData.map((p, i) => {
            const { start, end } = parseRange(p.period);
            const currentStaff = staff.find(s => s.name === p.name) || newOnes.find(s => s.name === p.name);
            const pos = currentStaff ? currentStaff.position : normalizePosition(p.position);
            
            return { 
                id: Date.now() + i + Math.random(), 
                name: String(p.name), 
                position: String(pos), 
                originalStatus: String(p.status), 
                type: String(normalizeType(p.status)), 
                start, 
                end, 
                details: String(p.reason),
                hasAttachment: !!p.hasAttachment
            };
          });
          setEvents(prev => {
            let updated = [...prev];

            return [...updated, ...newEvents];
          });

        };

                const updatedStaff = [...staff, ...newOnes];

                    const wA = getPositionWeight(a.position), wB = getPositionWeight(b.position);
                    if(wA !== wB) return wA - wB;
                    return String(a.name).localeCompare(String(b.name), 'ko');
                });
                setStaff(updatedStaff); 
                apply(); 
            });
        } else apply();
      };

            const start = clampDate(e.start, mngYear);
            const end = clampDate(e.end, mngYear);

            const mins = getDurationMins(start, end);
            childcareStats[e.name].totalMins += mins;
            childcareStats[e.name].types.add(e.originalStatus);
            childcareStats[e.name].events.push({ ...e, start, end, clampedMins: mins });
            
            let curD = new Date(start.getFullYear(), start.getMonth(), start.getDate());

                            <div className="flex flex-wrap items-center gap-2">
                               <button onClick={() => { setStaff(prev => { const dStaff = prev.filter(s => s.department === dept).sort((a,b) => String(a.name).localeCompare(String(b.name), 'ko')); const oStaff = prev.filter(s => s.department !== dept); return [...dStaff, ...oStaff]; }); showAlert(`${dept} 이름순 정렬 완료`); }} className="px-3 py-1.5 bg-white text-slate-600 rounded-lg text-xs font-semibold border border-slate-200 hover:bg-slate-100 transition-custom">이름순</button>
                               <button onClick={() => { setStaff(prev => { const dStaff = prev.filter(s => s.department === dept).sort((a,b) => (getPositionWeight(a.position) - getPositionWeight(b.position)) || String(a.name).localeCompare(String(b.name), 'ko')); const oStaff = prev.filter(s => s.department !== dept); return [...dStaff, ...oStaff]; }); showAlert(`${dept} 직위순 정렬 완료`); }} className="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold border border-blue-100 hover:bg-blue-100 transition-custom">직위순</button>
                               <button onClick={() => showConfirm(`부서를 삭제하시겠습니까? 소속 인원도 삭제됩니다.`, () => { setDepartments(departments.filter(d=>d!==dept)); setStaff(staff.filter(s=>s.department!==dept)); })} className="text-slate-400 hover:text-red-500 p-1.5 ml-1 transition-colors"><i className="fa-solid fa-trash-can"></i></button>
                            </div>
                         </div>
                         <div className="p-5 bg-white border-b border-slate-100">
                            <form onSubmit={e => { e.preventDefault(); if(settingsNewStaff.name.trim()){ setStaff([...staff, { id: Date.now().toString() + Math.random(), department: dept, position: normalizePosition(settingsNewStaff.position), name: settingsNewStaff.name.trim() }]); setSettingsNewStaff({ name:'', position:'', department:dept }); } }} className="flex flex-col md:flex-row gap-4"><input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.position : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, position:e.target.value, department:dept})} placeholder="직위 (교사 등)" className="w-full sm:w-32 border border-slate-200 rounded-xl px-3 py-2 text-sm bg-slate-50 font-medium outline-none focus:ring-2 focus:ring-blue-500"/>
                               <input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.name : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, name:e.target.value, department:dept})} placeholder="성명 입력" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm bg-slate-50 font-medium outline-none focus:ring-2 focus:ring-blue-500"/>
                               <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-custom text-sm"><span>추가</span></button>
                            </form>
                         </div>

                         <div className="px-5 py-3 bg-slate-50/50 border-b border-slate-100 flex flex-col sm:flex-row gap-2 items-center">
                            <select value={currentFilter.position} onChange={e => setDeptFilters(prev => ({...prev, [dept]: {...(prev[dept] || {name: '', position: '모두'}), position: e.target.value}}))} className="w-full sm:w-32 border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:ring-1 focus:ring-blue-500 outline-none bg-white font-medium">
                               {deptPositions.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                            <input type="text" value={currentFilter.name} onChange={e => setDeptFilters(prev => ({...prev, [dept]: {...(prev[dept] || {name: '', position: '모두'}), name: e.target.value}}))} placeholder="이름 검색" className="flex-1 w-full border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:ring-1 focus:ring-blue-500 outline-none font-medium"/>
                         </div>

                         <ul className="divide-y divide-slate-50 text-sm font-medium">
                            {staff
                              .filter(s => s.department === dept)
                              .filter(s => !currentFilter.position || currentFilter.position === '모두' || s.position === currentFilter.position)
                              .filter(s => s.name.includes(currentFilter.name))
                              .map((s, idx, arr) => (
                              <li key={s.id} className="px-6 py-3.5 flex justify-between items-center bg-white hover:bg-slate-50/50 transition-custom">
                                 {settingsEditingStaffId === s.id ? (
                                   <div className="flex flex-1 gap-2">
                                      <input type="text" value={settingsEditStaffData.position} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, position:e.target.value})} className="w-24 border border-slate-200 rounded-lg px-2 py-1 text-xs"/>
                                      <input type="text" value={settingsEditStaffData.name} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, name:e.target.value})} className="flex-1 border border-slate-200 rounded-lg px-2 py-1 text-xs"/>
                                      <div className="flex gap-1">
                                         <button onClick={() => { setStaff(staff.map(i => i.id === s.id ? { ...i, name: settingsEditStaffData.name.trim(), position: normalizePosition(settingsEditStaffData.position) } : i)); setSettingsEditingStaffId(null); }} className="bg-emerald-600 text-white px-3 py-1 rounded-lg font-bold transition-custom text-xs"><span>저장</span></button>
                                         <button onClick={() => setSettingsEditingStaffId(null)} className="bg-slate-200 text-slate-600 px-3 py-1 rounded-lg font-bold transition-custom text-xs"><span>취소</span></button>
                                      </div>
                                   </div>
                                 ) : (
                                   <>
                                     <div className="flex items-center gap-4">
                                        <span className="w-20 text-center text-[10px] font-bold text-slate-500 bg-slate-100 py-1 rounded-md border border-slate-200 truncate px-1"><span>{String(s.position)}</span></span>
                                        <span className="text-base font-bold text-slate-800">{String(s.name)}</span>
                                     </div>
                                     <div className="flex items-center gap-1">
                                        <div className="flex border border-slate-200 rounded-lg overflow-hidden mr-2">
                                           <button onClick={() => { const i=staff.findIndex(item=>item.id===s.id); if(i>0){ const n=[...staff]; [n[i],n[i-1]]=[n[i-1],n[i]]; setStaff(n); }}} disabled={idx===0} className="px-2.5 py-1 hover:bg-slate-100 disabled:opacity-20 text-slate-400"><i className="fa-solid fa-chevron-up text-[10px]"></i></button>
                                           <button onClick={() => { const i=staff.findIndex(item=>item.id===s.id); if(i<staff.length-1){ const n=[...staff]; [n[i],n[i+1]]=[n[i+1],n[i]]; setStaff(n); }}} disabled={idx===arr.length-1} className="px-2.5 py-1 border-l border-slate-200 hover:bg-slate-100 disabled:opacity-20 text-slate-400"><i className="fa-solid fa-chevron-down text-[10px]"></i></button>
                                        </div>
                                        <button onClick={() => { setSettingsEditingStaffId(s.id); setSettingsEditStaffData({name:s.name, position:s.position}); }} className="text-slate-400 hover:text-blue-500 p-2 transition-custom"><i className="fa-solid fa-pen text-sm"></i></button>
                                         <button onClick={() => setStaff(staff.filter(i=>i.id!==s.id))} className="text-slate-400 hover:text-red-500 p-2 transition-custom"><i className="fa-solid fa-trash-can text-sm"></i></button>
                                      </div>
                                   </>
                                 )}
                              </li>
                            ))}
                         </ul>
                      </div>
                    )})}
                 </div>
              </div>
           </div>
        );
      };

      return (
        <div className="min-h-screen pb-32">
          <header className="bg-white/90 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40 shadow-sm h-16 lg:h-20 flex items-center">
            <div className="max-w-7xl mx-auto px-6 w-full flex items-center justify-between">
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => { setViewMode('calendar'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg shadow-lg shadow-blue-200 transition-transform duration-500 group-hover:rotate-12"><i className="fa-solid fa-calendar-days"></i></div>
                <div><h1 className="text-xl font-bold text-slate-800 tracking-tight leading-none">WorkSync <span className="text-blue-600">Pro</span></h1></div>
              </div>
              <nav className="hidden lg:flex gap-2">
                {[
                  {id:'calendar', icon:'fa-calendar-days', label:'근무 달력'}, 
                  {id:'list', icon:'fa-list', label:'전체 목록'}, 
                  {id:'organization', icon:'fa-building', label:'기관 복무 현황'}, 
                  {id:'management', icon:'fa-clipboard-user', label:'복무 관리'}, 
                  {id:'upload', icon:'fa-file-arrow-up', label:'복무 파일 관리'}, 
                  {id:'settings', icon:'fa-gear', label:'인사 설정'}
                ].map(item => (
                  <button key={item.id} onClick={() => { setViewMode(item.id); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className={`px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}><i className={`fa-solid ${item.icon}`}></i><span>{item.label}</span></button>
                ))}
              </nav>
              <button onClick={() => {
                  setNewEvent({ id: null, name: '', type: '연가', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', details: '', hasAttachment: false, originalStatus: '' });
                  setIsModalOpen(true);
              }} className="hidden sm:flex bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:bg-slate-700 active:scale-95 transition-all text-sm"><i className="fa-solid fa-plus mr-2"></i><span>복무 신청</span></button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
             {viewMode === 'calendar' && renderCalendar()}
             {viewMode === 'list' && renderListView()}
             {viewMode === 'organization' && renderOrganizationView()}
             {viewMode === 'management' && renderManagementView()}
             {viewMode === 'upload' && renderUploadView()}
             {viewMode === 'settings' && renderSettingsView()}
          </main>

          <div className="lg:hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-4 py-3 rounded-full shadow-2xl flex items-center gap-2 border border-slate-200 z-50 animate-in slide-in-from-bottom-8">
             {[
               {id:'calendar', i:'fa-calendar-days'}, 
               {id:'list', i:'fa-list'}, 
               {id:'organization', i:'fa-building'}, 
               {id:'management', i:'fa-clipboard-user'}, 
               {id:'upload', i:'fa-file-arrow-up'}, 
               {id:'settings', i:'fa-gear'}
             ].map(item => (
               <button key={item.id} onClick={() => { setViewMode(item.id); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className={`w-10 h-10 flex items-center justify-center rounded-full transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100'}`}><i className={`fa-solid ${item.i} text-lg`}></i></button>
             ))}
             <div className="w-[1px] h-6 bg-slate-200 mx-1"></div>
             <button onClick={() => {
                 setNewEvent({ id: null, name: '', type: '연가', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', details: '', hasAttachment: false, originalStatus: '' });
                 setIsModalOpen(true);
             }} className="w-10 h-10 bg-slate-800 text-white flex items-center justify-center rounded-full shadow-lg active:scale-90"><i className="fa-solid fa-plus text-lg"></i></button>
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 font-medium bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden animate-in zoom-in-95 duration-300 border border-slate-200">
                <form onSubmit={handleSubmit}>
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 className="font-bold text-slate-800 text-xl flex items-center"><i className="fa-solid fa-pen-to-square text-blue-600 mr-3"></i><span>{newEvent.id ? '수동 복무 수정' : '수동 복무 등록'}</span></h3>
                    <button type="button" onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-700 transition-colors p-1"><i className="fa-solid fa-xmark text-2xl"></i></button>
                  </div>
                  <div className="p-6 md:p-8 space-y-6 overflow-y-auto max-h-[70vh] hide-scrollbar font-medium">
                    <div className="space-y-2"><label className="text-xs font-bold text-slate-500 ml-1">성명</label><input type="text" name="name" value={newEvent.name} onChange={handleInputChange} placeholder="이름을 입력하세요" required className="w-full border border-slate-300 rounded-xl px-4 py-3 text-base font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all"/></div>
                    <div className="grid grid-cols-2 gap-4">
                       <div className="space-y-2"><label className="text-xs font-bold text-slate-500 ml-1">복무 종류</label><select name="type" value={newEvent.type} onChange={handleInputChange} className="w-full border border-slate-300 rounded-xl px-3 py-3 text-base font-bold focus:border-blue-500 outline-none bg-white">{WORK_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                       <div className="space-y-2"><label className="text-xs font-bold text-slate-500 ml-1">해당 날짜</label><input type="date" name="date" value={newEvent.date} onChange={handleInputChange} className="w-full border border-slate-300 rounded-xl px-3 py-3 text-base font-bold focus:border-blue-500 outline-none"/></div>
                    </div>
                    <div className="flex gap-4">
                       <div className="flex-1 space-y-2"><label className="text-xs font-bold text-slate-500 ml-1">시작 시간</label><input type="time" name="startTime" value={newEvent.startTime} onChange={handleInputChange} className="w-full border border-slate-300 rounded-xl px-3 py-3 text-base font-bold focus:border-blue-500 outline-none"/></div>
                       <div className="flex-1 space-y-2"><label className="text-xs font-bold text-slate-500 ml-1">종료 시간</label><input type="time" name="endTime" value={newEvent.endTime} onChange={handleInputChange} className="w-full border border-slate-300 rounded-xl px-3 py-3 text-base font-bold focus:border-blue-500 outline-none"/></div>
                    </div>
                    <div className="space-y-2">
                      <div className="flex justify-between items-center ml-1"><label className="text-xs font-bold text-slate-500">구체적 사유 및 용무</label><button type="button" onClick={polishReasonWithAi} disabled={isAiLoading} className="text-[11px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg transition-all flex items-center gap-1.5 border border-indigo-100">{isAiLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : <i className="fa-solid fa-sparkles"></i>}AI 교정</button></div>
                      <textarea rows="2" name="details" value={newEvent.details} onChange={handleInputChange} placeholder="사유 또는 용무를 입력하세요" className="w-full border border-slate-300 rounded-xl px-4 py-3 text-base font-bold focus:border-blue-500 outline-none bg-white resize-none"/>
                    </div>
                    
                    {needsAttachment(newEvent.type, newEvent.originalStatus, newEvent.details) && (
                      <div className="space-y-2 animate-in fade-in">
                         <div className="flex items-center gap-3 ml-1 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <input type="checkbox" id="hasAttachment" checked={newEvent.hasAttachment} onChange={e => setNewEvent({...newEvent, hasAttachment: e.target.checked})} className="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer"/>
                            <label htmlFor="hasAttachment" className="text-sm font-bold text-slate-700 cursor-pointer">이 복무는 증빙서류 제출이 완료되었습니다.</label>
                         </div>
                      </div>
                    )}

                  </div>
                  <div className="p-6 bg-slate-50/80 border-t border-slate-100 flex gap-3">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3 border border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-white transition-custom text-sm">취소</button>
                    <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 transition-all text-sm active:scale-95">{newEvent.id ? '수정하기' : '저장하기'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {globalAlert.isOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 font-medium bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center animate-in zoom-in-95 duration-300 relative border border-slate-200">
                 {globalAlert.title ? (
                     <div className="flex flex-col items-center mb-6">
                        <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-4 border border-indigo-100"><i className="fa-solid fa-file-lines text-2xl"></i></div>
                        <h3 className="text-lg font-bold text-slate-800">{globalAlert.title}</h3>
                     </div>
                 ) : (
                     <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-100"><i className="fa-solid fa-circle-info text-2xl"></i></div>
                 )}
                 <div className={`bg-slate-50/80 p-5 rounded-2xl border border-slate-100 mb-8 font-medium text-[15px] text-slate-700 leading-relaxed tracking-tight max-h-[60vh] overflow-y-auto hide-scrollbar ${globalAlert.align === 'left' ? 'text-left' : 'text-center'}`}>
                    {typeof globalAlert.message === 'string' ? <div className="whitespace-pre-wrap">{globalAlert.message}</div> : globalAlert.message}
                 </div>
                 <button onClick={() => setGlobalAlert({isOpen: false, message: '', align: 'center', title: null})} className="w-full bg-slate-800 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-slate-700 transition-all text-base active:scale-95 tracking-wide">확인</button>
              </div>
            </div>
          )}

          {globalConfirm.isOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 font-medium bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center animate-in zoom-in-95 duration-300 relative border border-slate-200">
                 <div className="w-14 h-14 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-orange-100"><i className="fa-solid fa-circle-question text-3xl"></i></div>
                 <div className="bg-slate-50/80 p-5 rounded-2xl border border-slate-100 mb-8 font-bold text-base text-slate-800 leading-relaxed whitespace-pre-wrap">{String(globalConfirm.message)}</div>
                 <div className="flex gap-3">
                    <button onClick={() => setGlobalConfirm({isOpen: false, message: '', onConfirm: null})} className="flex-1 bg-white border border-slate-300 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-50 transition-all text-sm active:scale-95">취소</button>
                    <button onClick={() => { if(globalConfirm.onConfirm) globalConfirm.onConfirm(); setGlobalConfirm({isOpen: false, message: '', onConfirm: null}); }} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 transition-all text-sm active:scale-95">진행</button>
                 </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
