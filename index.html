<!DOCTYPE html>
<!-- 구글 번역 확장프로그램 등으로 인한 React 렌더링 충돌(하얀 화면) 원천 차단 -->
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>WorkSync Pro - 근무상황 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM (안정적인 cdnjs 사용) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for in-browser JSX compilation) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      font-size: 1.125rem; /* 전체 기본 폰트 크기 상향 (18px) */
    }
    /* 커스텀 스크롤바 감추기 (모바일 메뉴용) */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

    /* 버튼 및 입력창 터치 영역 확보 */
    input, select, button { min-height: 48px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 selection:bg-blue-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 에러 바운더리 (하얀 화면 방지용) ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
              <div className="bg-white rounded-[2.5rem] shadow-2xl max-w-lg w-full p-10 text-center border border-gray-100">
                <div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8">
                  <i className="fa-solid fa-triangle-exclamation text-5xl text-red-500"></i>
                </div>
                <h2 className="text-3xl font-black text-gray-800 mb-4 tracking-tight">시스템 업데이트 충돌</h2>
                <p className="text-lg text-gray-500 mb-10 leading-relaxed font-medium">
                  이전 버전의 데이터가 브라우저에 남아있거나 번역 플러그인 충돌이 발생했습니다.<br/>아래 버튼을 눌러 데이터를 초기화하면 정상적으로 작동합니다.
                </p>
                <button 
                  onClick={() => { localStorage.clear(); window.location.reload(); }} 
                  className="w-full bg-red-600 text-white px-8 py-5 rounded-2xl font-black shadow-xl shadow-red-100 hover:bg-red-700 active:scale-95 transition-all text-xl"
                >
                  <i className="fa-solid fa-rotate-right mr-3"></i> <span>이전 데이터 초기화 및 재실행</span>
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Gemini API Configuration ---
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = localStorage.getItem('gemini_api_key') || "";
      if (!apiKey) {
        throw new Error('API_KEY_MISSING');
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : { parts: [{ text: "You are a helpful administrative assistant for a South Korean elementary school." }] }
      };

      const maxRetries = 3;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error('API request failed');
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text;
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(res => setTimeout(res, 1000));
        }
      }
    };

    // --- Utilities ---
    const formatDate = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const formatTime = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    };

    const parseCSVLine = (line) => {
      const result = [];
      let currentStr = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
          result.push(currentStr.replace(/^"|"$/g, '').trim());
          currentStr = '';
        } else currentStr += char;
      }
      result.push(currentStr.replace(/^"|"$/g, '').trim());
      return result;
    };

    const robustDateParse = (dateStr) => {
      if (!dateStr) return null;
      const matches = dateStr.match(/\d+/g);
      if (matches && matches.length >= 3) {
        const year = parseInt(matches[0]);
        const month = parseInt(matches[1]) - 1;
        const day = parseInt(matches[2]);
        const hour = matches[3] ? parseInt(matches[3]) : 0;
        const minute = matches[4] ? parseInt(matches[4]) : 0;
        const date = new Date(year, month, day, hour, minute);
        return isNaN(date.getTime()) ? null : date;
      }
      return null;
    };

    const parseNeisPeriod = (periodStr) => {
      if (!periodStr || periodStr === '-') return { start: new Date(), end: new Date() };
      const parts = periodStr.split('~').map(s => s.trim());
      if (parts.length === 2) {
        const start = robustDateParse(parts[0]);
        const end = robustDateParse(parts[1]);
        if (start && end) return { start, end };
      } else {
        const start = robustDateParse(parts[0]);
        if (start) return { start, end: start };
      }
      return { start: new Date(), end: new Date() };
    };

    const normalizeType = (status) => {
      if (!status) return '기타';
      const s = status.replace(/\s/g, '');
      if (s.includes('연가') || s.includes('휴가')) return '연가';
      if (s.includes('병가') || s.includes('병조퇴')) return '병가';
      if (s.includes('출장')) return '출장';
      if (s.includes('조퇴')) return '조퇴';
      if (s.includes('외출')) return '외출';
      if (s.includes('공가')) return '공가';
      if (s.includes('정상')) return '정상근무';
      return '기타';
    };

    const getPositionWeight = (position) => {
      if (!position) return 100;
      const p = position.trim();
      if (p.includes('초등학교교장') || p === '교장') return 1;
      if (p.includes('초등학교교감') || p === '교감') return 2;
      if (p.includes('부장교사')) return 3;
      if (p.includes('초등학교교사') || p === '교사' || p.includes('초등교사')) return 4;
      if (p.includes('보건교사')) return 5;
      if (p.includes('특수학교교사') || p.includes('특수교사')) return 6;
      if (p.includes('영양교사')) return 7;
      if (p.includes('행정실장')) return 8;
      if (p.match(/\d+급/) || p.includes('7급') || p.includes('8급') || p.includes('9급')) return 9;
      return 50; 
    };

    // --- Configurations ---
    const DEFAULT_DEPARTMENTS = ['마산중앙초등학교'];
    const WORK_TYPES = ['연가', '병가', '공가', '특별휴가', '조퇴', '외출', '출장', '기타'];

    const getStatusColor = (statusName) => {
      if (!statusName) return 'bg-gray-100 text-gray-800 border-gray-300';
      const s = statusName;
      if (s.includes('연가') || s.includes('휴가')) return 'bg-blue-100 text-blue-800 border-blue-300';
      if (s.includes('병가') || s.includes('병조퇴')) return 'bg-red-100 text-red-800 border-red-300';
      if (s.includes('출장')) return 'bg-green-100 text-green-800 border-green-300';
      if (s.includes('조퇴')) return 'bg-yellow-100 text-yellow-800 border-yellow-300';
      if (s.includes('외출')) return 'bg-orange-100 text-orange-800 border-orange-300';
      if (s.includes('공가')) return 'bg-purple-100 text-purple-800 border-purple-300';
      if (s.includes('정상')) return 'bg-gray-50 text-gray-600 border-gray-200';
      return 'bg-gray-100 text-gray-800 border-gray-300';
    };

    const TYPE_COLORS = {
      '연가': 'bg-blue-100 text-blue-800 border-blue-300',
      '병가': 'bg-red-100 text-red-800 border-red-300',
      '공가': 'bg-purple-100 text-purple-800 border-purple-300',
      '특별휴가': 'bg-pink-100 text-pink-800 border-pink-300',
      '조퇴': 'bg-yellow-100 text-yellow-800 border-yellow-300',
      '외출': 'bg-orange-100 text-orange-800 border-orange-300',
      '출장': 'bg-green-100 text-green-800 border-green-300',
      '기타': 'bg-gray-100 text-gray-800 border-gray-300',
      '정상근무': 'bg-gray-50 text-gray-600 border-gray-200'
    };

    const CALENDAR_COLORS = {
      '연가': 'bg-blue-500',
      '병가': 'bg-red-500',
      '조퇴': 'bg-yellow-500',
      '외출': 'bg-orange-500',
      '출장': 'bg-green-500',
      '기타': 'bg-gray-500'
    };

    function App() {
      const [viewMode, setViewMode] = useState('calendar'); 
      const [uploadSubTab, setUploadSubTab] = useState('daily'); 
      const [currentMonth, setCurrentMonth] = useState(new Date());
      
      const [departments, setDepartments] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_departments');
          const parsed = saved ? JSON.parse(saved) : null;
          return Array.isArray(parsed) ? parsed : DEFAULT_DEPARTMENTS;
        } catch(e) { return DEFAULT_DEPARTMENTS; }
      });

      const [staff, setStaff] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_staff');
          const parsed = saved ? JSON.parse(saved) : null;
          return Array.isArray(parsed) ? parsed : [];
        } catch(e) { return []; }
      });

      const [events, setEvents] = useState(() => {
        try {
          const savedData = localStorage.getItem('work_schedule_events');
          if (savedData) {
            const parsed = JSON.parse(savedData);
            if(Array.isArray(parsed)) {
              return parsed.map(event => ({ 
                ...event, 
                start: new Date(event.start), 
                end: new Date(event.end) 
              }));
            }
          }
        } catch (e) { console.error("Event parse error"); }
        return [];
      });

      useEffect(() => {
        localStorage.setItem('work_schedule_departments', JSON.stringify(departments));
        localStorage.setItem('work_schedule_staff', JSON.stringify(staff));
        localStorage.setItem('work_schedule_events', JSON.stringify(events));
      }, [departments, staff, events]);

      const [isModalOpen, setIsModalOpen] = useState(false);
      const fileInputRef = useRef(null);
      
      const [dailyPreviewData, setDailyPreviewData] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncMessage, setSyncMessage] = useState('');

      const [globalAlert, setGlobalAlert] = useState({ isOpen: false, message: '' });
      const [globalConfirm, setGlobalConfirm] = useState({ isOpen: false, message: '', onConfirm: null, onCancel: null });

      const showAlert = (message) => setGlobalAlert({ isOpen: true, message: String(message) });
      const showConfirm = (message, onConfirm, onCancel) => setGlobalConfirm({ isOpen: true, message: String(message), onConfirm, onCancel });

      const [newEvent, setNewEvent] = useState({
        name: '', title: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: ''
      });

      const [orgSelectedDate, setOrgSelectedDate] = useState(formatDate(new Date()));
      const [orgFilterStatus, setOrgFilterStatus] = useState('전체');

      const [settingsNewDept, setSettingsNewDept] = useState('');
      const [settingsNewStaff, setSettingsNewStaff] = useState({ name: '', position: '', department: (Array.isArray(departments) && departments.length > 0) ? departments[0] : '' });
      const [settingsEditingStaffId, setSettingsEditingStaffId] = useState(null);
      const [settingsEditStaffData, setSettingsEditStaffData] = useState({ name: '', position: '' });
      const [settingsGeminiKey, setSettingsGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      
      const [aiReport, setAiReport] = useState("");
      const [isAiLoading, setIsAiLoading] = useState(false);


      const handleSelectEvent = (event) => {
        const startDate = formatDate(event.start);
        const endDate = formatDate(event.end);
        const startTime = formatTime(event.start);
        const endTime = formatTime(event.end);
        let periodStr = startDate === endDate ? `${startDate} [${startTime} ~ ${endTime}]` : `${startDate} ${startTime} ~ ${endDate} ${endTime}`;
        showAlert(`성명: ${event.name}\n복무: ${event.originalStatus || event.type}\n일시: ${periodStr}\n사유: ${event.details || '-'}${event.location ? `\n장소: ${event.location}` : ''}`);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setNewEvent(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const startDateTime = new Date(`${newEvent.date}T${newEvent.startTime}`);
        const endDateTime = new Date(`${newEvent.date}T${newEvent.endTime}`);
        const displayName = newEvent.name || '본인';
        const newEventObj = {
          id: Date.now(), name: String(displayName), title: String(newEvent.title || `[${displayName}] ${newEvent.type}`),
          start: startDateTime, end: endDateTime, type: String(newEvent.type), details: String(newEvent.details), location: String(newEvent.location)
        };
        setEvents(prev => {
          const filtered = prev.filter(ex => !(ex.name === newEventObj.name && formatDate(ex.start) === formatDate(newEventObj.start) && ex.type === newEventObj.type));
          return [...filtered, newEventObj];
        });
        setIsModalOpen(false);
        setNewEvent({ name: '', title: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: '' });
      };

      const deleteEvent = (id) => setEvents(events.filter(event => event.id !== id));

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsSyncing(true);
        setSyncMessage('파일 분석 중...');
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const rows = []; let row = ""; let inQuotes = false;
            for (const char of text) {
              if (char === '"') inQuotes = !inQuotes;
              if (char === '\n' && !inQuotes) { rows.push(row.trim()); row = ""; } else row += char;
            }
            if (row) rows.push(row.trim());
            const lines = rows.filter(l => l.length > 0);
            if (lines.length < 2) throw new Error('데이터 부족');
            const rawHeaders = parseCSVLine(lines[0]);
            const headers = rawHeaders.map(h => h.replace(/\s/g, ''));
            
            const isDailyFile = headers.some(h => h.includes('근무상황') || h.includes('목적지'));
            const isPeriodFile = headers.some(h => h.includes('종별') || h.includes('결재상태'));

            if (uploadSubTab === 'daily' && isPeriodFile && !isDailyFile) throw new Error('WRONG_TAB_PERIOD');
            if (uploadSubTab === 'period' && isDailyFile && !isPeriodFile) throw new Error('WRONG_TAB_DAILY');
            if (uploadSubTab === 'daily' && !isDailyFile) throw new Error('INVALID_DAILY_FILE');
            if (uploadSubTab === 'period' && !isPeriodFile) throw new Error('INVALID_PERIOD_FILE');

            const parsedData = [];
            if (uploadSubTab === 'daily') {
              for (let i = 1; i < lines.length; i++) {
                const currentLine = parseCSVLine(lines[i]);
                const obj = {}; headers.forEach((h, idx) => obj[h] = currentLine[idx] || '');
                if ((obj['성명'] || obj['부서']) && obj['근무상황'] !== '정상근무') {
                  parsedData.push({ id: i, department: obj['부서'], position: obj['직급/직위/직종'], name: obj['성명'], status: obj['근무상황'], period: obj['기간'], reason: obj['목적지'] || '-', approval: obj['승인상태'] });
                }
              }
            } else {
              const nIdx = headers.findIndex(h => h.includes('성명')), pIdx = headers.findIndex(h => h.includes('기간')), tIdx = headers.findIndex(h => h.includes('종별')), rIdx = headers.findIndex(h => h.includes('사유')), sIdx = headers.findIndex(h => h.includes('결재상태')), dIdx = headers.findIndex(h => h.includes('부서명')), posIdx = headers.findIndex(h => h.includes('직급'));
              for (let i = 1; i < lines.length; i++) {
                const cur = parseCSVLine(lines[i]);
                const rawName = cur[nIdx] || '', cleanName = rawName.split(/[\r\n(]/)[0].trim(), status = cur[tIdx] || '', period = cur[pIdx] || '';
                if (cleanName && status && !status.includes('정상')) {
                  parsedData.push({ id: i, department: cur[dIdx] || departments[0] || '-', position: cur[posIdx] || '-', name: cleanName, status: status, period: period, reason: cur[rIdx] || '-', approval: cur[sIdx] || '완결' });
                }
              }
            }
            setDailyPreviewData(parsedData);
            setSyncMessage(`총 ${parsedData.length}건 성공적으로 로드.`);
          } catch (error) { 
            if (error.message === 'WRONG_TAB_PERIOD') showAlert('잘못된 파일입니다.\n\n[일일 현황] 탭에 [기간별 현황] 파일을 올리셨습니다.');
            else if (error.message === 'WRONG_TAB_DAILY') showAlert('잘못된 파일입니다.\n\n[기간별 현황] 탭에 [일일 현황] 파일을 올리셨습니다.');
            else setSyncMessage('파일 형식 분석 실패. 나이스 CSV 파일인지 확인해주세요.');
          } finally { setIsSyncing(false); e.target.value = ''; }
        };
        reader.readAsText(file, 'utf-8');
      };

      const handleApplyUpdates = () => {
        if (dailyPreviewData.length === 0) return;
        const existingNames = new Set(staff.map(s => s.name));
        const newStaffCandidates = []; const seenNames = new Set();
        dailyPreviewData.forEach(p => {
          if (!existingNames.has(p.name) && !seenNames.has(p.name)) {
            newStaffCandidates.push({ id: (Date.now() + Math.random()).toString(36), name: p.name, position: p.position || '-', department: p.department || departments[0] });
            seenNames.add(p.name);
          }
        });
        const proceed = () => {
          let earliest = null, latest = null;
          const newEvents = dailyPreviewData.map((person, index) => {
            const { start, end } = parseNeisPeriod(person.period);
            if (start && (!earliest || start < earliest)) earliest = start;
            if (end && (!latest || end > latest)) latest = end;
            return { id: Date.now() + index, name: String(person.name), department: String(person.department), position: String(person.position), originalStatus: String(person.status), title: `[${person.name}] ${person.status}`, start, end, type: normalizeType(person.status), details: String(person.reason), location: person.status.includes('출장') ? String(person.reason) : '' };
          });
          setEvents(prev => {
            let updated = [...prev];
            newEvents.forEach(ne => updated = updated.filter(ex => !(ex.name === ne.name && formatDate(ex.start) === formatDate(ne.start) && ex.type === ne.type)));
            return [...updated, ...newEvents];
          });
          if (earliest && !isNaN(earliest.getTime())) setCurrentMonth(new Date(earliest.getFullYear(), earliest.getMonth(), 1));
          setDailyPreviewData([]); setSyncMessage('');
          showAlert(`${newEvents.length}건 업데이트 완료.`);
          setViewMode('calendar');
        };
        if (newStaffCandidates.length > 0) showConfirm(`신규 근무자 발견: ${newStaffCandidates.map(s => s.name).join(', ')}\n상시 명단에 추가하시겠습니까?`, () => { setStaff([...staff, ...newStaffCandidates]); proceed(); }, proceed);
        else proceed();
      };

      const generateAiReport = async (date, currentStaffStatuses) => {
        setIsAiLoading(true);
        const summary = currentStaffStatuses.map(s => `${s.name}(${s.position}): ${s.status}`).join('\n');
        const prompt = `다음 교직원 근무 현황을 분석하여 정중한 보고용 요약 리포트를 한국어로 작성해 주세요.\n\n날짜: ${date}\n현황:\n${summary}`;
        try {
          const result = await callGemini(prompt, "School administrative reporting expert.");
          setAiReport(result);
        } catch (error) {

                </div>
                <ul className="divide-y divide-gray-100 text-base">
                  {staff.filter(s => s.department === dept).map((s, idx, arr) => (
                    <li key={s.id} className="px-8 py-5 flex justify-between items-center hover:bg-gray-50 transition-colors">
                      {settingsEditingStaffId === s.id ? (
                        <div className="flex flex-col sm:flex-row gap-4 w-full animate-in slide-in-from-left-2 duration-200">
                          <input type="text" value={settingsEditStaffData.position} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, position: e.target.value})} className="w-full sm:w-48 border-2 border-gray-100 p-3 rounded-2xl text-base shadow-sm font-bold"/>
                          <input type="text" value={settingsEditStaffData.name} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, name: e.target.value})} className="flex-1 border-2 border-gray-100 p-3 rounded-2xl text-base shadow-sm font-bold"/>
                          <div className="flex gap-2">
                            <button onClick={() => { setStaff(staff.map(item => item.id === s.id ? { ...item, name: settingsEditStaffData.name.trim(), position: settingsEditStaffData.position.trim() } : item)); setSettingsEditingStaffId(null); }} className="flex-1 bg-green-600 text-white px-6 py-3 rounded-2xl font-black hover:bg-green-700 shadow-md"><span>저장</span></button>
                            <button onClick={() => setSettingsEditingStaffId(null)} className="flex-1 bg-gray-200 px-6 py-3 rounded-2xl font-black hover:bg-gray-300 text-gray-700"><span>취소</span></button>
                          </div>
                        </div>
                      ) : (
                        <>
                          <div className="flex items-center gap-6">
                            <span className="w-32 sm:w-40 text-center text-xs font-black text-blue-700 bg-blue-50 py-2 rounded-xl border-2 border-blue-100 truncate shadow-sm">{String(s.position)}</span>
                            <span className="font-black text-gray-800 text-xl">{String(s.name)}</span>
                          </div>
                          <div className="flex items-center gap-2 sm:gap-4">
                            <div className="flex border-2 border-gray-100 rounded-xl overflow-hidden shadow-sm">
                              <button onClick={() => { const i = staff.findIndex(item=>item.id===s.id); if(i>0){ const n=[...staff]; [n[i],n[i-1]]=[n[i-1],n[i]]; setStaff(n); } }} disabled={idx === 0} className={`px-3 py-2 ${idx === 0 ? 'text-gray-100 bg-gray-50' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fa-solid fa-chevron-up"></i></button>
                              <button onClick={() => { const i = staff.findIndex(item=>item.id===s.id); if(i<staff.length-1){ const n=[...staff]; [n[i],n[i+1]]=[n[i+1],n[i]]; setStaff(n); } }} disabled={idx === arr.length - 1} className={`px-3 py-2 border-l-2 border-gray-100 ${idx === arr.length - 1 ? 'text-gray-100 bg-gray-50' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fa-solid fa-chevron-down"></i></button>
                            </div>
                            <button onClick={() => { setSettingsEditingStaffId(s.id); setSettingsEditStaffData({name: s.name, position: s.position}); }} className="text-gray-400 hover:text-blue-600 p-2 sm:p-3 transition-colors"><i className="fa-solid fa-pen text-xl"></i></button>
                            <button onClick={() => setStaff(staff.filter(i => i.id !== s.id))} className="text-gray-400 hover:text-red-500 p-2 sm:p-3 transition-colors"><i className="fa-solid fa-trash-can text-xl"></i></button>
                          </div>
                        </>
                      )}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        );
      };

      const renderListView = () => {
        const sorted = [...events].sort((a, b) => b.start - a.start);
        return (
          <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in fade-in duration-700 border border-gray-50">
            <div className="p-8 border-b font-black text-gray-800 flex flex-col sm:flex-row items-start sm:items-center justify-between bg-gray-50/30 gap-4">
              <div className="flex items-center gap-5">
                <div className="p-4 bg-blue-100 rounded-3xl flex-shrink-0">
                   <i className="fa-solid fa-list text-2xl text-blue-600"></i>
                </div>
                <div>
                   <h3 className="text-2xl tracking-tight"><span>전체 복무 마스터 목록</span></h3>
                   <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1"><span>Total {events.length} Records</span></p>
                </div>
              </div>
            </div>
            <div className="divide-y divide-gray-50">
              {sorted.length === 0 ? (
                <div className="p-32 text-center text-gray-300 font-black flex flex-col items-center gap-8">
                   <i className="fa-regular fa-file-lines text-6xl opacity-20"></i>
                   <p className="text-2xl"><span>아직 등록된 복무 데이터가 없습니다.</span></p>
                </div>
              ) : sorted.map(e => (
                <div key={e.id} className="p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center hover:bg-blue-50/10 transition-all group gap-6 border-b border-gray-50 last:border-0">
                  <div className="flex-1 w-full">
                    <div className="flex items-center gap-4 mb-4">
                      <span className={`px-4 py-1.5 rounded-xl text-xs font-black border-2 shadow-sm whitespace-nowrap ${TYPE_COLORS[e.type] || 'bg-gray-100'}`}><span>{String(e.type)}</span></span>
                      <span className="font-black text-xl text-gray-800 tracking-tight truncate">{String(e.name)} <span className="font-bold text-gray-300 text-sm ml-3">/ {String(e.details)}</span></span>
                    </div>
                    <div className="text-sm sm:text-base text-gray-400 flex flex-wrap items-center gap-6 sm:gap-10 font-bold tracking-tight">
                      <span className="flex items-center gap-3 whitespace-nowrap"><i className="fa-regular fa-clock text-lg text-blue-300"></i> <span>{formatDate(e.start)} {formatTime(e.start)} ~ {formatDate(e.end)} {formatTime(e.end)}</span></span>
                      {e.location && <span className="flex items-center gap-3 px-4 py-1.5 bg-green-50 text-green-600 rounded-xl"><i className="fa-solid fa-location-dot text-lg"></i> <span>{String(e.location)}</span></span>}
                    </div>
                  </div>
                  <button onClick={() => deleteEvent(e.id)} className="w-full sm:w-auto text-center text-gray-200 hover:text-red-500 p-4 hover:bg-red-50 rounded-2xl transition-all shadow-sm sm:shadow-none bg-white sm:bg-transparent border sm:border-0"><i className="fa-solid fa-trash-can text-2xl"></i></button>
                </div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen pb-32">
          <header className="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 lg:px-8">
              <div className="flex items-center justify-between h-20 lg:h-24">
                <div className="flex items-center gap-4 cursor-pointer" onClick={() => setViewMode('calendar')}>
                  <div className="p-3 lg:p-4 bg-blue-600 rounded-[1.25rem] lg:rounded-[1.75rem] shadow-2xl shadow-blue-200">
                    <i className="fa-solid fa-calendar-days text-2xl lg:text-3xl text-white"></i>
                  </div>
                  <div>
                     <h1 className="text-2xl lg:text-3xl font-black tracking-tighter text-gray-800 leading-none"><span>WorkSync</span> <span className="text-blue-600">Pro</span></h1>
                     <span className="hidden sm:inline-block text-[11px] font-bold text-gray-400 tracking-widest uppercase mt-2"><span>Admin Presence System</span></span>
                  </div>
                </div>
                
                {/* Desktop Menu */}
                <nav className="hidden lg:flex gap-2">
                  {[
                    { id: 'calendar', icon: 'fa-solid fa-calendar', label: '근무 달력' },
                    { id: 'list', icon: 'fa-solid fa-list', label: '전체 목록' },
                    { id: 'organization', icon: 'fa-solid fa-building', label: '기관 현황' },
                    { id: 'upload', icon: 'fa-solid fa-file-arrow-up', label: '복무 업로드' },
                    { id: 'settings', icon: 'fa-solid fa-gear', label: '인사 설정' }
                  ].map(item => (
                    <button key={item.id} onClick={() => setViewMode(item.id)} className={`px-6 py-3 rounded-2xl text-[15px] font-black flex items-center gap-3 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'text-gray-400 hover:bg-gray-50 hover:text-gray-600'}`}>
                      <i className={item.icon + " text-lg"}></i> <span>{item.label}</span>
                    </button>
                  ))}
                </nav>

                <button onClick={() => setIsModalOpen(true)} className="hidden sm:flex relative overflow-hidden bg-gray-900 text-white px-8 lg:px-10 py-4 rounded-2xl lg:rounded-3xl text-[14px] lg:text-[16px] font-black shadow-2xl hover:shadow-gray-300 transition-all hover:scale-105 active:scale-95">
                   <i className="fa-solid fa-plus mr-3 text-lg"></i> <span>복무 신청</span>
                </button>
              </div>
              
              {/* Mobile Scrollable Menu */}
              <nav className="flex lg:hidden overflow-x-auto hide-scrollbar gap-3 py-4 border-t border-gray-50">
                {[
                  { id: 'calendar', icon: 'fa-solid fa-calendar', label: '근무 달력' },
                  { id: 'list', icon: 'fa-solid fa-list', label: '전체 목록' },
                  { id: 'organization', icon: 'fa-solid fa-building', label: '기관 현황' },
                  { id: 'upload', icon: 'fa-solid fa-file-arrow-up', label: '복무 업로드' },
                  { id: 'settings', icon: 'fa-solid fa-gear', label: '인사 설정' }
                ].map(item => (
                  <button key={item.id} onClick={() => setViewMode(item.id)} className={`flex-shrink-0 px-6 py-3 rounded-2xl text-sm font-black flex items-center gap-3 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-md shadow-blue-100' : 'bg-gray-100 text-gray-500'}`}>
                    <i className={item.icon}></i> <span>{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 lg:px-8 py-8 lg:py-16">
            {viewMode === 'calendar' && renderCustomCalendar()}
            {viewMode === 'list' && renderListView()}
            {viewMode === 'organization' && renderOrganizationView()}
            {viewMode === 'upload' && renderUploadView()}
            {viewMode === 'settings' && renderSettingsView()}
          </main>

          {/* 모바일 하단 플로팅 추가 버튼 */}
          <button 
            onClick={() => setIsModalOpen(true)} 
            className="sm:hidden fixed bottom-8 right-8 w-16 h-16 bg-gray-900 text-white rounded-full shadow-2xl shadow-gray-400 flex items-center justify-center hover:scale-110 active:scale-95 z-40 transition-transform"
          >
            <i className="fa-solid fa-plus text-2xl"></i>
          </button>

          {/* 💡 수동 복무 등록 모달 (폰트 사이즈 대폭 상향) */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-md animate-in fade-in duration-300" onClick={() => setIsModalOpen(false)}></div>
              <div className="bg-white rounded-[3rem] shadow-2xl z-10 w-full max-w-xl overflow-hidden animate-in zoom-in duration-300 border border-gray-100">
                <form onSubmit={handleSubmit}>
                  <div className="p-8 lg:p-10 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                    <div className="flex items-center gap-4">
                       <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-100">
                          <i className="fa-solid fa-plus text-xl text-white"></i>
                       </div>
                       <h3 className="font-black text-gray-800 text-2xl tracking-tight"><span>수동 복무 등록</span></h3>
                    </div>
                    <button type="button" onClick={() => setIsModalOpen(false)} className="text-gray-300 hover:text-gray-600 transition-colors"><i className="fa-solid fa-xmark text-3xl"></i></button>
                  </div>
                  <div className="p-8 lg:p-12 space-y-8 overflow-y-auto max-h-[70vh]">
                    <div className="space-y-3">
                      <label className="text-sm font-black text-blue-600 uppercase tracking-widest ml-2"><span>성명</span></label>
                      <input type="text" name="name" value={newEvent.name} onChange={handleInputChange} placeholder="성명 입력" required className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                       <div className="space-y-3">
                         <label className="text-sm font-black text-blue-600 uppercase tracking-widest ml-2"><span>복무 종별</span></label>
                         <select name="type" value={newEvent.type} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white appearance-none">
                           {WORK_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                         </select>
                       </div>
                       <div className="space-y-3">
                         <label className="text-sm font-black text-blue-600 uppercase tracking-widest ml-2"><span>날짜</span></label>
                         <input type="date" name="date" value={newEvent.date} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                       </div>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-8">
                      <div className="flex-1 space-y-3">
                        <label className="text-sm font-black text-blue-600 uppercase tracking-widest ml-2"><span>시작 시간</span></label>
                        <input type="time" name="startTime" value={newEvent.startTime} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                      </div>
                      <div className="flex-1 space-y-3">
                        <label className="text-sm font-black text-blue-600 uppercase tracking-widest ml-2"><span>종료 시간</span></label>
                        <input type="time" name="endTime" value={newEvent.endTime} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                      </div>
                    </div>
                    <div className="space-y-3">
                      <div className="flex justify-between items-center ml-2">
                         <label className="text-sm font-black text-blue-600 uppercase tracking-widest"><span>상세 사유</span></label>
                         <button 
                          type="button"
                          onClick={polishReasonWithAi}
                          disabled={isAiLoading}
                          className="flex items-center gap-2 text-xs font-black text-indigo-600 hover:text-indigo-800 transition-all disabled:opacity-50 border border-indigo-100 bg-indigo-50 px-3 py-1.5 rounded-xl shadow-sm"
                         >
                           {isAiLoading ? <i className="fa-solid fa-arrows-rotate animate-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                           <span>✨ AI 다듬기</span>
                         </button>
                      </div>
                      <textarea rows="2" name="details" value={newEvent.details} onChange={handleInputChange} placeholder="사유를 입력하고 AI 버튼을 눌러보세요" className="w-full border-2 border-gray-100 rounded-[1.5rem] p-5 text-xl font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white resize-none"/>
                    </div>
                  </div>
                  <div className="p-8 lg:p-10 bg-gray-50/50 border-t border-gray-50 flex gap-6">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-5 border-2 border-gray-200 rounded-2xl font-black text-gray-400 hover:bg-white hover:text-gray-600 transition-all active:scale-95 text-lg"><span>취소</span></button>
                    <button type="submit" className="flex-1 py-5 bg-blue-600 text-white rounded-2xl font-black shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95 text-lg"><span>신청 완료</span></button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 💡 글로벌 알림 모달 (내용 폰트 사이즈 상향) */}
          {globalAlert.isOpen && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg p-10 lg:p-14 animate-in zoom-in duration-300 border border-gray-100">
                <div className="flex flex-col items-center text-center">
                  <div className="w-20 h-20 bg-blue-50 rounded-[2rem] flex items-center justify-center mb-8 shadow-inner">
                    <i className="fa-solid fa-circle-exclamation text-4xl text-blue-600"></i>
                  </div>
                  <h3 className="font-black text-gray-900 text-3xl mb-6 tracking-tight"><span>알림</span></h3>
                  <div className="bg-gray-50/50 p-6 rounded-3xl w-full border-2 border-gray-50 mb-10">
                     <p className="text-xl text-gray-700 whitespace-pre-wrap leading-relaxed font-bold tracking-tight"><span>{String(globalAlert.message)}</span></p>
                  </div>
                  <button onClick={() => setGlobalAlert({isOpen: false, message: ''})} className="w-full bg-gray-900 text-white py-5 rounded-[1.5rem] font-black shadow-2xl hover:bg-gray-800 active:scale-95 transition-all text-xl"><span>확인했습니다</span></button>
                </div>
              </div>
            </div>
          )}

          {/* 💡 글로벌 확인 모달 (내용 폰트 사이즈 상향) */}
          {globalConfirm.isOpen && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg p-10 lg:p-14 animate-in zoom-in duration-300 border border-gray-100">
                 <div className="flex flex-col items-center text-center">
                  <div className="w-20 h-20 bg-orange-50 rounded-[2rem] flex items-center justify-center mb-8 shadow-inner">
                     <i className="fa-solid fa-circle-question text-4xl text-orange-600"></i>
                  </div>
                  <h3 className="font-black text-gray-900 text-3xl mb-6 tracking-tight"><span>확인이 필요합니다</span></h3>
                  <div className="bg-gray-50/50 p-6 rounded-3xl w-full border-2 border-gray-50 mb-10">
                     <p className="text-xl text-gray-700 whitespace-pre-wrap leading-relaxed font-bold tracking-tight"><span>{String(globalConfirm.message)}</span></p>
                  </div>
                  <div className="flex gap-4 w-full">
                    <button onClick={() => { if(globalConfirm.onCancel) globalConfirm.onCancel(); setGlobalConfirm({isOpen: false, message: '', onConfirm: null, onCancel: null}); }} className="flex-1 bg-gray-100 text-gray-500 py-5 rounded-[1.5rem] font-black hover:bg-gray-200 transition-all active:scale-95 text-xl"><span>취소</span></button>
                    <button onClick={() => { if(globalConfirm.onConfirm) globalConfirm.onConfirm(); setGlobalConfirm({isOpen: false, message: '', onConfirm: null, onCancel: null}); }} className="flex-1 bg-blue-600 text-white py-5 rounded-[1.5rem] font-black shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95 text-xl"><span>진행하기</span></button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
