<!DOCTYPE html>
<!-- 구글 번역 확장프로그램 등으로 인한 React 렌더링 충돌(하얀 화면) 원천 차단 -->
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>WorkSync Pro - 근무상황 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM (안정적인 cdnjs 사용) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for in-browser JSX compilation) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    /* 커스텀 스크롤바 감추기 (모바일 메뉴용) */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 selection:bg-blue-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 에러 바운더리 (하얀 화면 방지용) ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
              <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 text-center border border-gray-100">
                <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                  <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i>
                </div>
                <h2 className="text-2xl font-black text-gray-800 mb-3 tracking-tight">시스템 업데이트 충돌</h2>
                <p className="text-sm text-gray-500 mb-8 leading-relaxed font-medium">
                  이전 버전의 데이터가 브라우저에 남아있거나 번역 플러그인 충돌이 발생했습니다.<br/>아래 버튼을 눌러 데이터를 초기화하면 정상적으로 작동합니다.
                </p>
                <button 
                  onClick={() => { localStorage.clear(); window.location.reload(); }} 
                  className="w-full bg-red-600 text-white px-6 py-4 rounded-2xl font-black shadow-xl shadow-red-100 hover:bg-red-700 active:scale-95 transition-all"
                >
                  <i className="fa-solid fa-rotate-right mr-2"></i> <span>이전 데이터 초기화 및 재실행</span>
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Gemini API Configuration ---
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = localStorage.getItem('gemini_api_key') || "";
      if (!apiKey) {
        throw new Error('API_KEY_MISSING');
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : { parts: [{ text: "You are a helpful administrative assistant for a South Korean elementary school." }] }
      };

      const maxRetries = 3;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error('API request failed');
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text;
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(res => setTimeout(res, 1000));
        }
      }
    };

    // --- Utilities ---
    const formatDate = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const formatTime = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    };

    const parseCSVLine = (line) => {
      const result = [];
      let currentStr = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
          result.push(currentStr.replace(/^"|"$/g, '').trim());
          currentStr = '';
        } else currentStr += char;
      }
      result.push(currentStr.replace(/^"|"$/g, '').trim());
      return result;
    };

    const robustDateParse = (dateStr) => {
      if (!dateStr) return null;
      const matches = dateStr.match(/\d+/g);
      if (matches && matches.length >= 3) {
        const year = parseInt(matches[0]);
        const month = parseInt(matches[1]) - 1;
        const day = parseInt(matches[2]);
        const hour = matches[3] ? parseInt(matches[3]) : 0;
        const minute = matches[4] ? parseInt(matches[4]) : 0;
        const date = new Date(year, month, day, hour, minute);
        return isNaN(date.getTime()) ? null : date;
      }
      return null;
    };

    const parseNeisPeriod = (periodStr) => {
      if (!periodStr || periodStr === '-') return { start: new Date(), end: new Date() };
      const parts = periodStr.split('~').map(s => s.trim());
      if (parts.length === 2) {
        const start = robustDateParse(parts[0]);
        const end = robustDateParse(parts[1]);
        if (start && end) return { start, end };
      } else {
        const start = robustDateParse(parts[0]);
        if (start) return { start, end: start };
      }
      return { start: new Date(), end: new Date() };
    };

    const normalizeType = (status) => {
      if (!status) return '기타';
      const s = status.replace(/\s/g, '');
      if (s.includes('연가') || s.includes('휴가')) return '연가';
      if (s.includes('병가') || s.includes('병조퇴')) return '병가';
      if (s.includes('출장')) return '출장';
      if (s.includes('조퇴')) return '조퇴';
      if (s.includes('외출')) return '외출';
      if (s.includes('공가')) return '공가';
      if (s.includes('정상')) return '정상근무';
      return '기타';
    };

    const getPositionWeight = (position) => {
      if (!position) return 100;
      const p = position.trim();
      if (p.includes('초등학교교장') || p === '교장') return 1;
      if (p.includes('초등학교교감') || p === '교감') return 2;
      if (p.includes('부장교사')) return 3;
      if (p.includes('초등학교교사') || p === '교사' || p.includes('초등교사')) return 4;
      if (p.includes('보건교사')) return 5;
      if (p.includes('특수학교교사') || p.includes('특수교사')) return 6;
      if (p.includes('영양교사')) return 7;
      if (p.includes('행정실장')) return 8;
      if (p.match(/\d+급/) || p.includes('7급') || p.includes('8급') || p.includes('9급')) return 9;
      return 50; 
    };

    // --- Configurations ---
    const DEFAULT_DEPARTMENTS = ['마산중앙초등학교'];
    const WORK_TYPES = ['연가', '병가', '공가', '특별휴가', '조퇴', '외출', '출장', '기타'];

    const getStatusColor = (statusName) => {
      if (!statusName) return 'bg-gray-100 text-gray-800 border-gray-300';
      const s = statusName;
      if (s.includes('연가') || s.includes('휴가')) return 'bg-blue-100 text-blue-800 border-blue-300';
      if (s.includes('병가') || s.includes('병조퇴')) return 'bg-red-100 text-red-800 border-red-300';
      if (s.includes('출장')) return 'bg-green-100 text-green-800 border-green-300';
      if (s.includes('조퇴')) return 'bg-yellow-100 text-yellow-800 border-yellow-300';
      if (s.includes('외출')) return 'bg-orange-100 text-orange-800 border-orange-300';
      if (s.includes('공가')) return 'bg-purple-100 text-purple-800 border-purple-300';
      if (s.includes('정상')) return 'bg-gray-50 text-gray-600 border-gray-200';
      return 'bg-gray-100 text-gray-800 border-gray-300';
    };

    const TYPE_COLORS = {
      '연가': 'bg-blue-100 text-blue-800 border-blue-300',
      '병가': 'bg-red-100 text-red-800 border-red-300',
      '공가': 'bg-purple-100 text-purple-800 border-purple-300',
      '특별휴가': 'bg-pink-100 text-pink-800 border-pink-300',
      '조퇴': 'bg-yellow-100 text-yellow-800 border-yellow-300',
      '외출': 'bg-orange-100 text-orange-800 border-orange-300',
      '출장': 'bg-green-100 text-green-800 border-green-300',
      '기타': 'bg-gray-100 text-gray-800 border-gray-300',
      '정상근무': 'bg-gray-50 text-gray-600 border-gray-200'
    };

    const CALENDAR_COLORS = {
      '연가': 'bg-blue-500',
      '병가': 'bg-red-500',
      '조퇴': 'bg-yellow-500',
      '외출': 'bg-orange-500',
      '출장': 'bg-green-500',
      '기타': 'bg-gray-500'
    };

    function App() {
      const [viewMode, setViewMode] = useState('calendar'); 
      const [uploadSubTab, setUploadSubTab] = useState('daily'); 
      const [currentMonth, setCurrentMonth] = useState(new Date());
      
      const [departments, setDepartments] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_departments');
          const parsed = saved ? JSON.parse(saved) : null;
          return Array.isArray(parsed) ? parsed : DEFAULT_DEPARTMENTS;
        } catch(e) { return DEFAULT_DEPARTMENTS; }
      });

      const [staff, setStaff] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_staff');
          const parsed = saved ? JSON.parse(saved) : null;
          return Array.isArray(parsed) ? parsed : [];
        } catch(e) { return []; }
      });

      const [events, setEvents] = useState(() => {
        try {
          const savedData = localStorage.getItem('work_schedule_events');
          if (savedData) {
            const parsed = JSON.parse(savedData);
            if(Array.isArray(parsed)) {
              return parsed.map(event => ({ 
                ...event, 
                start: new Date(event.start), 
                end: new Date(event.end) 
              }));
            }
          }
        } catch (e) { console.error("Event parse error"); }
        return [];
      });

      useEffect(() => {
        localStorage.setItem('work_schedule_departments', JSON.stringify(departments));
        localStorage.setItem('work_schedule_staff', JSON.stringify(staff));
        localStorage.setItem('work_schedule_events', JSON.stringify(events));
      }, [departments, staff, events]);

      const [isModalOpen, setIsModalOpen] = useState(false);
      const fileInputRef = useRef(null);
      
      const [dailyPreviewData, setDailyPreviewData] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncMessage, setSyncMessage] = useState('');

      const [globalAlert, setGlobalAlert] = useState({ isOpen: false, message: '' });
      const [globalConfirm, setGlobalConfirm] = useState({ isOpen: false, message: '', onConfirm: null, onCancel: null });

      const showAlert = (message) => setGlobalAlert({ isOpen: true, message: String(message) });
      const showConfirm = (message, onConfirm, onCancel) => setGlobalConfirm({ isOpen: true, message: String(message), onConfirm, onCancel });

      const [newEvent, setNewEvent] = useState({
        name: '', title: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: ''
      });

      // --- 💡 뷰 함수 내부에서 사용되던 Hook 상태들을 최상위로 끌어올림 (에러 방지) ---
      // (1) OrganizationView 용 상태
      const [orgSelectedDate, setOrgSelectedDate] = useState(formatDate(new Date()));
      const [orgFilterStatus, setOrgFilterStatus] = useState('전체');

      // (2) SettingsView 용 상태
      const [settingsNewDept, setSettingsNewDept] = useState('');
      const [settingsNewStaff, setSettingsNewStaff] = useState({ name: '', position: '', department: (Array.isArray(departments) && departments.length > 0) ? departments[0] : '' });
      const [settingsEditingStaffId, setSettingsEditingStaffId] = useState(null);
      const [settingsEditStaffData, setSettingsEditStaffData] = useState({ name: '', position: '' });
      const [settingsGeminiKey, setSettingsGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      
      // (3) AI 기능 관련 상태
      const [aiReport, setAiReport] = useState("");
      const [isAiLoading, setIsAiLoading] = useState(false);


      const handleSelectEvent = (event) => {
        const startDate = formatDate(event.start);
        const endDate = formatDate(event.end);
        const startTime = formatTime(event.start);
        const endTime = formatTime(event.end);
        let periodStr = startDate === endDate ? `${startDate} [${startTime} ~ ${endTime}]` : `${startDate} ${startTime} ~ ${endDate} ${endTime}`;
        showAlert(`성명: ${event.name}\n복무: ${event.originalStatus || event.type}\n일시: ${periodStr}\n사유: ${event.details || '-'}${event.location ? `\n장소: ${event.location}` : ''}`);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setNewEvent(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const startDateTime = new Date(`${newEvent.date}T${newEvent.startTime}`);
        const endDateTime = new Date(`${newEvent.date}T${newEvent.endTime}`);
        const displayName = newEvent.name || '본인';
        const newEventObj = {
          id: Date.now(), name: String(displayName), title: String(newEvent.title || `[${displayName}] ${newEvent.type}`),
          start: startDateTime, end: endDateTime, type: String(newEvent.type), details: String(newEvent.details), location: String(newEvent.location)
        };
        setEvents(prev => {
          const filtered = prev.filter(ex => !(ex.name === newEventObj.name && formatDate(ex.start) === formatDate(newEventObj.start) && ex.type === newEventObj.type));
          return [...filtered, newEventObj];
        });
        setIsModalOpen(false);
        setNewEvent({ name: '', title: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: '' });
      };

      const deleteEvent = (id) => setEvents(events.filter(event => event.id !== id));

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsSyncing(true);
        setSyncMessage('파일 분석 중...');
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const rows = []; let row = ""; let inQuotes = false;
            for (const char of text) {
              if (char === '"') inQuotes = !inQuotes;
              if (char === '\n' && !inQuotes) { rows.push(row.trim()); row = ""; } else row += char;
            }
            if (row) rows.push(row.trim());
            const lines = rows.filter(l => l.length > 0);
            if (lines.length < 2) throw new Error('데이터 부족');
            const rawHeaders = parseCSVLine(lines[0]);
            const headers = rawHeaders.map(h => h.replace(/\s/g, ''));
            
            // 💡 파일 형식 검증(Validation) 로직 추가
            const isDailyFile = headers.some(h => h.includes('근무상황') || h.includes('목적지'));
            const isPeriodFile = headers.some(h => h.includes('종별') || h.includes('결재상태'));

            if (uploadSubTab === 'daily' && isPeriodFile && !isDailyFile) {
                throw new Error('WRONG_TAB_PERIOD');
            }
            if (uploadSubTab === 'period' && isDailyFile && !isPeriodFile) {
                throw new Error('WRONG_TAB_DAILY');
            }
            if (uploadSubTab === 'daily' && !isDailyFile) {
                 throw new Error('INVALID_DAILY_FILE');
            }
            if (uploadSubTab === 'period' && !isPeriodFile) {
                 throw new Error('INVALID_PERIOD_FILE');
            }

            const parsedData = [];
            if (uploadSubTab === 'daily') {
              for (let i = 1; i < lines.length; i++) {
                const currentLine = parseCSVLine(lines[i]);
                const obj = {}; headers.forEach((h, idx) => obj[h] = currentLine[idx] || '');
                if ((obj['성명'] || obj['부서']) && obj['근무상황'] !== '정상근무') {
                  parsedData.push({ id: i, department: obj['부서'], position: obj['직급/직위/직종'], name: obj['성명'], status: obj['근무상황'], period: obj['기간'], reason: obj['목적지'] || '-', approval: obj['승인상태'] });
                }
              }
            } else {
              const nIdx = headers.findIndex(h => h.includes('성명')), pIdx = headers.findIndex(h => h.includes('기간')), tIdx = headers.findIndex(h => h.includes('종별')), rIdx = headers.findIndex(h => h.includes('사유')), sIdx = headers.findIndex(h => h.includes('결재상태')), dIdx = headers.findIndex(h => h.includes('부서명')), posIdx = headers.findIndex(h => h.includes('직급'));
              for (let i = 1; i < lines.length; i++) {
                const cur = parseCSVLine(lines[i]);
                const rawName = cur[nIdx] || '', cleanName = rawName.split(/[\r\n(]/)[0].trim(), status = cur[tIdx] || '', period = cur[pIdx] || '';
                if (cleanName && status && !status.includes('정상')) {
                  parsedData.push({ id: i, department: cur[dIdx] || departments[0] || '-', position: cur[posIdx] || '-', name: cleanName, status: status, period: period, reason: cur[rIdx] || '-', approval: cur[sIdx] || '완결' });
                }
              }
            }
            setDailyPreviewData(parsedData);
            setSyncMessage(`총 ${parsedData.length}건 성공적으로 로드.`);
          } catch (error) { 
            if (error.message === 'WRONG_TAB_PERIOD') {
                showAlert('잘못된 파일입니다.\n\n현재 [일일 현황] 탭이 선택되어 있으나 [기간별 현황] 파일이 업로드 되었습니다. 탭을 변경하거나 알맞은 파일을 선택해 주세요.');
                setSyncMessage('');
            } else if (error.message === 'WRONG_TAB_DAILY') {
                showAlert('잘못된 파일입니다.\n\n현재 [기간별 현황] 탭이 선택되어 있으나 [일일 현황] 파일이 업로드 되었습니다. 탭을 변경하거나 알맞은 파일을 선택해 주세요.');
                setSyncMessage('');
            } else if (error.message === 'INVALID_DAILY_FILE') {
                showAlert('파일 형식이 맞지 않습니다.\n나이스 [일일근무상황조회]에서 다운로드한 파일인지 확인해 주세요.');
                setSyncMessage('');
            } else if (error.message === 'INVALID_PERIOD_FILE') {
                showAlert('파일 형식이 맞지 않습니다.\n나이스 [기간별복무조회]에서 다운로드한 파일인지 확인해 주세요.');
                setSyncMessage('');
            } else {
                setSyncMessage('파일 형식 분석 실패. 나이스 CSV 파일인지 확인해주세요.'); 
            }
          } finally { setIsSyncing(false); e.target.value = ''; }
        };
        reader.readAsText(file, 'utf-8');
      };

      const handleApplyUpdates = () => {
        if (dailyPreviewData.length === 0) return;
        const existingNames = new Set(staff.map(s => s.name));
        const newStaffCandidates = []; const seenNames = new Set();
        dailyPreviewData.forEach(p => {
          if (!existingNames.has(p.name) && !seenNames.has(p.name)) {
            newStaffCandidates.push({ id: (Date.now() + Math.random()).toString(36), name: p.name, position: p.position || '-', department: p.department || departments[0] });
            seenNames.add(p.name);
          }
        });
        const proceed = () => {
          let earliest = null, latest = null;
          const newEvents = dailyPreviewData.map((person, index) => {
            const { start, end } = parseNeisPeriod(person.period);
            if (start && (!earliest || start < earliest)) earliest = start;
            if (end && (!latest || end > latest)) latest = end;
            return { id: Date.now() + index, name: String(person.name), department: String(person.department), position: String(person.position), originalStatus: String(person.status), title: `[${person.name}] ${person.status}`, start, end, type: normalizeType(person.status), details: String(person.reason), location: person.status.includes('출장') ? String(person.reason) : '' };
          });
          setEvents(prev => {
            let updated = [...prev];

            return a.name.localeCompare(b.name, 'ko');

                <button type="submit" className="bg-indigo-600 text-white px-8 py-3 rounded-lg text-sm font-black hover:bg-indigo-700 transition-all shadow-md active:scale-95"><span>키 저장</span></button>
              </form>
              <p className="text-xs text-gray-400 mt-3 font-medium"><span>※ AI 현황 요약 및 사유 자동 다듬기 기능을 사용하려면 구글 Gemini API 키가 필요합니다. 이 키는 다른 곳으로 전송되지 않고 사용하시는 로컬 브라우저에만 안전하게 보관됩니다.</span></p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-lg flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
              <h3 className="font-black flex items-center gap-2 text-gray-800 text-lg"><i className="fa-solid fa-gear text-xl text-gray-600"></i> <span>인사 설정 (조직도 관리)</span></h3>
              <div className="flex gap-2 w-full lg:w-auto">
                <button onClick={handleSortStaff} className="flex-1 lg:flex-none text-xs font-black bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-100 transition-all shadow-sm whitespace-nowrap">
                  <i className="fa-solid fa-arrow-down-a-z text-sm"></i> <span>직위순 정렬</span>
                </button>
                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="flex-1 lg:flex-none text-xs font-black text-red-500 border border-red-200 px-4 py-2 rounded-lg hover:bg-red-50 transition-all shadow-sm whitespace-nowrap"><span>데이터 전체 초기화</span></button>
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-lg">
              <h4 className="text-sm font-black text-gray-700 mb-4"><span>새 부서 추가</span></h4>
              <form onSubmit={handleAddDept} className="flex gap-2">
                <input type="text" value={settingsNewDept} onChange={e => setSettingsNewDept(e.target.value)} placeholder="부서명 입력 (예: 교무실)" className="flex-1 border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm"/>
                <button type="submit" className="bg-gray-800 text-white px-6 rounded-lg text-sm font-black hover:bg-gray-900 transition-all shadow-md"><span>추가</span></button>
              </form>
            </div>

            {Array.isArray(departments) && departments.map(dept => (
              <div key={dept} className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 overflow-x-auto">
                <div className="bg-gray-50 px-5 py-4 border-b flex justify-between items-center">
                  <span className="font-black text-blue-800 whitespace-nowrap">{String(dept)}</span>
                  <button onClick={() => handleDeleteDept(dept)} className="text-red-400 hover:text-red-600 transition-colors"><i className="fa-solid fa-trash-can text-lg"></i></button>
                </div>
                <div className="p-4 bg-blue-50/20 border-b">
                  <form onSubmit={e => handleAddStaff(e, dept)} className="flex flex-col sm:flex-row gap-2">
                    <input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.position : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, position: e.target.value, department: dept})} placeholder="직위 (예: 교사)" className="w-full sm:w-32 border rounded-lg p-2 text-xs outline-none focus:ring-1 focus:ring-blue-500 shadow-sm bg-white"/>
                    <input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.name : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, name: e.target.value, department: dept})} placeholder="성명" className="flex-1 border rounded-lg p-2 text-xs outline-none focus:ring-1 focus:ring-blue-500 shadow-sm bg-white"/>
                    <button type="submit" className="bg-blue-600 text-white px-5 py-2 rounded-lg text-xs font-black hover:bg-blue-700 shadow-sm whitespace-nowrap"><span>추가</span></button>
                  </form>
                </div>
                <ul className="divide-y text-sm min-w-[300px]">
                  {Array.isArray(staff) && staff.filter(s => s.department === dept).map((s, idx, arr) => (
                    <li key={s.id} className="p-4 flex justify-between items-center hover:bg-gray-50 transition-colors">
                      {settingsEditingStaffId === s.id ? (
                        <div className="flex flex-col sm:flex-row gap-2 w-full animate-in slide-in-from-left-2 duration-200">
                          <input type="text" value={settingsEditStaffData.position} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, position: e.target.value})} className="w-full sm:w-32 border p-2 rounded-lg text-xs shadow-sm"/>
                          <input type="text" value={settingsEditStaffData.name} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, name: e.target.value})} className="flex-1 border p-2 rounded-lg text-xs shadow-sm"/>
                          <div className="flex gap-2">
                            <button onClick={() => handleEditSave(s.id)} className="flex-1 bg-green-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-green-700 shadow-sm whitespace-nowrap"><span>저장</span></button>
                            <button onClick={() => setSettingsEditingStaffId(null)} className="flex-1 bg-gray-200 px-3 py-2 rounded-lg text-xs font-bold hover:bg-gray-300 shadow-sm text-gray-700 whitespace-nowrap"><span>취소</span></button>
                          </div>
                        </div>
                      ) : (
                        <>
                          <div className="flex items-center gap-4">
                            <span className="w-24 sm:w-32 text-center text-[10px] sm:text-[11px] font-black text-blue-700 bg-blue-50 py-1.5 rounded-lg border border-blue-100 truncate shadow-sm">{String(s.position)}</span>
                            <span className="font-bold text-gray-800">{String(s.name)}</span>
                          </div>
                          <div className="flex items-center gap-1 sm:gap-3">
                            <div className="flex border rounded-lg overflow-hidden shadow-sm">
                              <button onClick={() => handleMoveStaff(s.id, 'up')} disabled={idx === 0} className={`px-2 py-1 ${idx === 0 ? 'text-gray-100 bg-gray-50' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fa-solid fa-chevron-up text-xs sm:text-sm"></i></button>
                              <button onClick={() => handleMoveStaff(s.id, 'down')} disabled={idx === arr.length - 1} className={`px-2 py-1 border-l ${idx === arr.length - 1 ? 'text-gray-100 bg-gray-50' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fa-solid fa-chevron-down text-xs sm:text-sm"></i></button>
                            </div>
                            <button onClick={() => { setSettingsEditingStaffId(s.id); setSettingsEditStaffData({name: s.name, position: s.position}); }} className="text-gray-400 hover:text-blue-600 p-1 sm:p-2 transition-colors"><i className="fa-solid fa-pen text-xs sm:text-sm"></i></button>
                            <button onClick={() => setStaff(staff.filter(i => i.id !== s.id))} className="text-gray-400 hover:text-red-500 p-1 sm:p-2 transition-colors"><i className="fa-solid fa-trash-can text-xs sm:text-sm"></i></button>
                          </div>
                        </>
                      )}
                    </li>
                  ))}
                  {Array.isArray(staff) && staff.filter(s => s.department === dept).length === 0 && (
                    <li className="p-10 text-center text-gray-400 italic"><span>등록된 근무자가 없습니다. 상단 폼을 통해 추가하세요.</span></li>
                  )}
                </ul>
              </div>
            ))}
          </div>
        );
      };

      const renderListView = () => {
        const sorted = [...events].sort((a, b) => b.start - a.start);
        return (
          <div className="bg-white rounded-3xl shadow-xl overflow-hidden animate-in fade-in duration-700 border border-gray-50">
            <div className="p-4 sm:p-7 border-b font-black text-gray-800 flex flex-col sm:flex-row items-start sm:items-center justify-between bg-gray-50/30 gap-2">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-blue-100 rounded-xl flex-shrink-0">
                   <i className="fa-solid fa-list text-lg text-blue-600"></i>
                </div>
                <div>
                   <h3 className="text-base sm:text-lg tracking-tight"><span>전체 복무 마스터 목록</span></h3>
                   <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest"><span>Total {events.length} Records</span></p>
                </div>
              </div>
            </div>
            <div className="divide-y divide-gray-50">
              {sorted.length === 0 ? (
                <div className="p-20 sm:p-32 text-center text-gray-300 font-black flex flex-col items-center gap-5">
                   <div className="w-16 h-16 sm:w-20 sm:h-20 bg-gray-50 rounded-full flex items-center justify-center">
                      <i className="fa-regular fa-file-lines text-3xl sm:text-4xl opacity-20"></i>
                   </div>
                   <p><span>아직 등록된 복무 데이터가 없습니다.</span></p>
                </div>
              ) : sorted.map(e => (
                <div key={e.id} className="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center hover:bg-blue-50/10 transition-all group gap-4">
                  <div className="flex-1 w-full">
                    <div className="flex items-center gap-3 mb-2 sm:mb-3">
                      <span className={`px-3 py-1 rounded-xl text-[10px] font-black border-2 shadow-sm whitespace-nowrap ${TYPE_COLORS[e.type] || 'bg-gray-100'}`}><span>{String(e.type)}</span></span>
                      <span className="font-black text-sm sm:text-base text-gray-800 tracking-tight truncate">{String(e.name)} <span className="font-bold text-gray-300 text-[10px] sm:text-xs ml-1 sm:ml-2">/ {String(e.details)}</span></span>
                    </div>
                    <div className="text-[10px] sm:text-[11px] text-gray-400 flex flex-wrap items-center gap-3 sm:gap-6 font-bold tracking-tight">
                      <span className="flex items-center gap-1 sm:gap-2 whitespace-nowrap"><i className="fa-regular fa-clock text-xs sm:text-sm text-blue-300"></i> <span>{formatDate(e.start)} {formatTime(e.start)} ~ {formatDate(e.end)} {formatTime(e.end)}</span></span>
                      {e.location && <span className="flex items-center gap-1 sm:gap-2 px-2 sm:px-3 py-1 bg-green-50 text-green-600 rounded-lg truncate max-w-[150px] sm:max-w-none"><i className="fa-solid fa-location-dot text-xs sm:text-sm"></i> <span>{String(e.location)}</span></span>}
                    </div>
                  </div>
                  <button onClick={() => deleteEvent(e.id)} className="w-full sm:w-auto text-center text-gray-200 hover:text-red-500 p-2 sm:p-3 hover:bg-red-50 rounded-xl sm:rounded-2xl transition-all"><i className="fa-solid fa-trash-can text-lg sm:text-xl"></i></button>
                </div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen pb-24">
          <header className="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 lg:px-6">
              <div className="flex items-center justify-between h-16 lg:h-20">
                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setViewMode('calendar')}>
                  <div className="p-2 lg:p-2.5 bg-blue-600 rounded-[1rem] lg:rounded-[1.25rem] shadow-xl shadow-blue-100">
                    <i className="fa-solid fa-calendar-days text-lg lg:text-xl text-white"></i>
                  </div>
                  <div>
                     <h1 className="text-lg lg:text-xl font-black tracking-tighter text-gray-800 leading-none"><span>WorkSync</span> <span className="text-blue-600">Pro</span></h1>
                     <span className="hidden sm:inline-block text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-1"><span>Admin Dashboard</span></span>
                  </div>
                </div>
                
                {/* Desktop Menu */}
                <nav className="hidden lg:flex gap-1.5">
                  {[
                    { id: 'calendar', icon: 'fa-solid fa-calendar', label: '근무 달력' },
                    { id: 'list', icon: 'fa-solid fa-list', label: '전체 목록' },
                    { id: 'organization', icon: 'fa-solid fa-building', label: '기관 현황' },
                    { id: 'upload', icon: 'fa-solid fa-file-arrow-up', label: '복무 업로드' },
                    { id: 'settings', icon: 'fa-solid fa-gear', label: '인사 설정' }
                  ].map(item => (
                    <button key={item.id} onClick={() => setViewMode(item.id)} className={`px-5 py-2.5 rounded-2xl text-[13px] font-black flex items-center gap-2.5 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'text-gray-400 hover:bg-gray-50 hover:text-gray-600'}`}>
                      <i className={item.icon + " text-sm"}></i> <span>{item.label}</span>
                    </button>
                  ))}
                </nav>

                <button onClick={() => setIsModalOpen(true)} className="hidden sm:flex relative overflow-hidden bg-gray-900 text-white px-5 lg:px-7 py-2.5 lg:py-3 rounded-xl lg:rounded-2xl text-[12px] lg:text-[13px] font-black shadow-2xl hover:shadow-gray-200 transition-all hover:scale-105 active:scale-95 group">
                   <span className="relative z-10 flex items-center gap-2">
                      <i className="fa-solid fa-plus text-sm"></i> <span>복무 신청</span>
                   </span>
                </button>
              </div>
              
              {/* Mobile Scrollable Menu */}
              <nav className="flex lg:hidden overflow-x-auto hide-scrollbar gap-2 py-3 border-t border-gray-50">
                {[
                  { id: 'calendar', icon: 'fa-solid fa-calendar', label: '근무 달력' },
                  { id: 'list', icon: 'fa-solid fa-list', label: '전체 목록' },
                  { id: 'organization', icon: 'fa-solid fa-building', label: '기관 현황' },
                  { id: 'upload', icon: 'fa-solid fa-file-arrow-up', label: '복무 업로드' },
                  { id: 'settings', icon: 'fa-solid fa-gear', label: '인사 설정' }
                ].map(item => (
                  <button key={item.id} onClick={() => setViewMode(item.id)} className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-md shadow-blue-100' : 'bg-gray-100 text-gray-500'}`}>
                    <i className={item.icon}></i> <span>{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 lg:px-6 py-6 lg:py-10">
            {viewMode === 'calendar' && renderCustomCalendar()}
            {viewMode === 'list' && renderListView()}
            {viewMode === 'organization' && renderOrganizationView()}
            {viewMode === 'upload' && renderUploadView()}
            {viewMode === 'settings' && renderSettingsView()}
          </main>

          {/* 모바일 하단 플로팅 추가 버튼 */}
          <button 
            onClick={() => setIsModalOpen(true)} 
            className="sm:hidden fixed bottom-6 right-6 w-14 h-14 bg-gray-900 text-white rounded-full shadow-2xl shadow-gray-400 flex items-center justify-center hover:scale-105 active:scale-95 z-40"
          >
            <i className="fa-solid fa-plus text-xl"></i>
          </button>

          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/60 backdrop-blur-sm animate-in fade-in duration-300" onClick={() => setIsModalOpen(false)}></div>
              <div className="bg-white rounded-[2rem] shadow-2xl z-10 w-full max-w-md overflow-hidden animate-in zoom-in duration-300 border border-gray-100">
                <form onSubmit={handleSubmit}>
                  <div className="p-5 lg:p-7 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                    <div className="flex items-center gap-3">
                       <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100">
                          <i className="fa-solid fa-plus text-lg text-white"></i>
                       </div>
                       <h3 className="font-black text-gray-800 text-lg tracking-tight"><span>수동 복무 등록</span></h3>
                    </div>
                    <button type="button" onClick={() => setIsModalOpen(false)} className="text-gray-300 hover:text-gray-600 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                  </div>
                  <div className="p-6 lg:p-8 space-y-5 overflow-y-auto max-h-[60vh]">
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1"><span>성명</span></label>
                      <input type="text" name="name" value={newEvent.name} onChange={handleInputChange} placeholder="성명 입력" required className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                    </div>
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1"><span>종별</span></label>
                      <select name="type" value={newEvent.type} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white appearance-none">
                        {WORK_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1"><span>날짜</span></label>
                      <input type="date" name="date" value={newEvent.date} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                    </div>
                    <div className="flex gap-4">
                      <div className="flex-1 space-y-1.5">
                        <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1"><span>시작</span></label>
                        <input type="time" name="startTime" value={newEvent.startTime} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                      </div>
                      <div className="flex-1 space-y-1.5">
                        <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1"><span>종료</span></label>
                        <input type="time" name="endTime" value={newEvent.endTime} onChange={handleInputChange} className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                      </div>
                    </div>
                    <div className="space-y-1.5">
                      <div className="flex justify-between items-center ml-1">
                         <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest"><span>상세 사유</span></label>
                         <button 
                          type="button"
                          onClick={polishReasonWithAi}
                          disabled={isAiLoading}
                          className="flex items-center gap-1 text-[10px] font-black text-indigo-600 hover:text-indigo-800 transition-all disabled:opacity-50"
                         >
                           {isAiLoading ? <i className="fa-solid fa-arrows-rotate text-xs animate-spin"></i> : <i className="fa-solid fa-wand-magic text-xs"></i>}
                           <span>✨ AI 다듬기</span>
                         </button>
                      </div>
                      <input type="text" name="details" value={newEvent.details} onChange={handleInputChange} placeholder="사유를 입력하고 AI 버튼을 눌러보세요" className="w-full border-2 border-gray-100 rounded-2xl p-3.5 text-sm font-bold focus:border-blue-500 outline-none transition-all shadow-sm bg-white"/>
                    </div>
                  </div>
                  <div className="p-5 lg:p-7 bg-gray-50/50 border-t border-gray-50 flex gap-4">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3 lg:py-4 border-2 border-gray-200 rounded-2xl font-black text-gray-400 hover:bg-white hover:text-gray-600 transition-all active:scale-95"><span>취소</span></button>
                    <button type="submit" className="flex-1 py-3 lg:py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95"><span>신청 완료</span></button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {globalAlert.isOpen && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/50 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 lg:p-10 animate-in zoom-in duration-300 border border-gray-100">
                <div className="flex flex-col items-center text-center">
                  <div className="w-16 h-16 bg-blue-50 rounded-3xl flex items-center justify-center mb-6">
                    <i className="fa-solid fa-circle-exclamation text-3xl text-blue-600"></i>
                  </div>
                  <h3 className="font-black text-gray-900 text-xl mb-3 tracking-tight"><span>알림</span></h3>
                  <p className="text-sm text-gray-500 mb-10 whitespace-pre-wrap leading-relaxed font-medium"><span>{String(globalAlert.message)}</span></p>
                  <button onClick={() => setGlobalAlert({isOpen: false, message: ''})} className="w-full bg-gray-900 text-white py-4 rounded-2xl font-black shadow-2xl hover:bg-gray-800 active:scale-95 transition-all"><span>확인했습니다</span></button>
                </div>
              </div>
            </div>
          )}

          {globalConfirm.isOpen && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/50 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 lg:p-10 animate-in zoom-in duration-300 border border-gray-100">
                 <div className="flex flex-col items-center text-center">
                  <div className="w-16 h-16 bg-orange-50 rounded-3xl flex items-center justify-center mb-6">
                     <i className="fa-solid fa-circle-question text-3xl text-orange-600"></i>
                  </div>
                  <h3 className="font-black text-gray-900 text-xl mb-3 tracking-tight"><span>확인이 필요합니다</span></h3>
                  <p className="text-sm text-gray-500 mb-10 whitespace-pre-wrap leading-relaxed font-medium"><span>{String(globalConfirm.message)}</span></p>
                  <div className="flex gap-4 w-full">
                    <button onClick={() => { if(globalConfirm.onCancel) globalConfirm.onCancel(); setGlobalConfirm({isOpen: false, message: ''}); }} className="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black hover:bg-gray-200 transition-all active:scale-95"><span>취소</span></button>
                    <button onClick={() => { if(globalConfirm.onConfirm) globalConfirm.onConfirm(); setGlobalConfirm({isOpen: false, message: ''}); }} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95"><span>진행하기</span></button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
