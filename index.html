<!DOCTYPE html>
<!-- 구글 번역 확장프로그램 등으로 인한 React 렌더링 충돌(하얀 화면) 원천 차단 -->
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>WorkSync Pro - 근무상황 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM (안정적인 cdnjs 사용) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      font-size: 1.15rem; 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    input, select, button, textarea { min-height: 48px; }
    .transition-custom { transition: all 0.2s ease-in-out; }
    
    .calendar-day { min-height: 150px; }
    .text-huge { font-size: 1.5rem; }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 selection:bg-blue-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 에러 바운더리 ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-white p-4">
              <div className="max-w-lg w-full p-10 text-center border border-slate-200 rounded-[2.5rem] shadow-2xl">
                <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-8"></i>
                <h2 className="text-3xl font-semibold text-slate-900 mb-4">화면을 불러올 수 없습니다</h2>
                <p className="text-slate-500 mb-10 leading-relaxed text-lg font-medium">데이터 충돌이나 브라우저 자동 번역 기능으로 인해 에러가 발생했습니다. 아래 버튼을 눌러 데이터를 초기화해 주세요.</p>
                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-slate-800 transition-custom text-xl shadow-xl active:scale-95">설정 및 데이터 초기화</button>
                <pre className="mt-6 text-[10px] text-slate-300 overflow-auto text-left max-h-32">{this.state.error && this.state.error.toString()}</pre>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Gemini API 연동 ---
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = localStorage.getItem('gemini_api_key') || "";
      if (!apiKey) throw new Error('API 키가 설정되지 않았습니다. [인사 설정] 탭에서 등록해 주세요.');
      
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction || "School admin expert." }] }
      };
      
      try {
        const response = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
        });
        
        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || `서버 에러 발생 (HTTP ${response.status})`);
        }
        
        const result = await response.json();
        if (result.candidates && result.candidates[0]?.content?.parts?.[0]?.text) {
            return result.candidates[0].content.parts[0].text;
        } else {
            throw new Error("결과를 생성하지 못했습니다. (응답 형식 오류 또는 안전 필터 제한)");
        }
      } catch (error) {
        console.error("Gemini API Error:", error);
        throw error;
      }
    };

    // --- Utilities ---
    const formatDate = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const formatTime = (date) => {
      if (!date) return "";
      const d = new Date(date);
      if (isNaN(d.getTime())) return "";
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    };

    const parseCSVLine = (line) => {
      const result = []; let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else current += char;
      }
      result.push(current.trim());
      return result;
    };

    const robustDateParse = (dateStr) => {
      if (!dateStr) return null;
      const matches = dateStr.match(/\d+/g);
      if (matches && matches.length >= 3) {
        const d = new Date(matches[0], matches[1] - 1, matches[2], matches[3] || 0, matches[4] || 0);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;
    };

    const parseNeisPeriod = (periodStr) => {
      const parts = periodStr.split('~').map(s => s.trim());
      const start = robustDateParse(parts[0]);
      const end = parts[1] ? robustDateParse(parts[1]) : start;
      return { start, end };
    };

    const normalizeType = (status) => {
      if (!status) return '기타';
      const s = status.replace(/\s/g, '');
      if (s.includes('연가') || s.includes('휴가')) return '연가';
      if (s.includes('병가') || s.includes('병조퇴')) return '병가';
      if (s.includes('출장')) return '출장';
      if (s.includes('조퇴')) return '조퇴';
      if (s.includes('외출')) return '외출';
      if (s.includes('공가')) return '공가';
      if (s.includes('정상')) return '정상근무';
      return '기타';
    };

    const getPositionWeight = (position) => {
      if (!position) return 99;
      const p = position.trim();
      if (p.includes('교장')) return 1;
      if (p.includes('교감')) return 2;
      if (p.includes('교사') || p.includes('초등교사')) return 3;
      if (p.includes('행정실장')) return 4;
      return 10;
    };

    const TYPE_COLORS = {
      '연가': 'bg-blue-50 text-blue-600 border-blue-100',
      '병가': 'bg-red-50 text-red-600 border-red-100',
      '공가': 'bg-purple-50 text-purple-600 border-purple-100',
      '출장': 'bg-emerald-50 text-emerald-600 border-emerald-100',
      '조퇴': 'bg-amber-50 text-amber-600 border-amber-100',
      '외출': 'bg-orange-50 text-orange-600 border-orange-100',
      '정상근무': 'bg-slate-50 text-slate-400 border-slate-100'
    };

    const CALENDAR_COLORS = {
      '연가': 'bg-blue-500', '병가': 'bg-red-500', '공가': 'bg-purple-500', '출장': 'bg-emerald-500', '조퇴': 'bg-amber-500', '외출': 'bg-orange-500', '기타': 'bg-slate-400'
    };

    const WORK_TYPES = ['연가', '병가', '공가', '특별휴가', '조퇴', '외출', '출장', '기타'];

    // --- Main Component ---
    function App() {
      // (1) 네비게이션 및 기본 데이터
      const [viewMode, setViewMode] = useState('calendar'); 
      const [uploadSubTab, setUploadSubTab] = useState('daily'); 
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [departments, setDepartments] = useState(() => JSON.parse(localStorage.getItem('work_schedule_departments')) || ['마산중앙초등학교']);
      const [staff, setStaff] = useState(() => JSON.parse(localStorage.getItem('work_schedule_staff')) || []);
      const [events, setEvents] = useState(() => {
        const saved = localStorage.getItem('work_schedule_events');
        if (!saved) return [];
        try { 
          return JSON.parse(saved).map(e => ({ 
            ...e, 
            start: new Date(e.start), 
            end: new Date(e.end) 
          })); 
        } catch(e) { return []; }
      });

      // (2) 필터 및 설정 상태 (Lifting Up)
      const [listSearchName, setListSearchName] = useState('');
      const [listSearchType, setListSearchType] = useState('전체');
      const [listSearchStartDate, setListSearchStartDate] = useState('');
      const [listSearchEndDate, setListSearchEndDate] = useState('');
      const [appliedFilter, setAppliedFilter] = useState({ name: '', type: '전체', start: '', end: '' });

      const [orgSelectedDate, setOrgSelectedDate] = useState(formatDate(new Date()));
      const [orgFilterStatus, setOrgFilterStatus] = useState('전체');

      const [settingsNewDept, setSettingsNewDept] = useState('');
      const [settingsNewStaff, setSettingsNewStaff] = useState({ name: '', position: '', department: '' });
      const [settingsEditingStaffId, setSettingsEditingStaffId] = useState(null);
      const [settingsEditStaffData, setSettingsEditStaffData] = useState({ name: '', position: '' });
      const [settingsGeminiKey, setSettingsGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');

      const [aiReport, setAiReport] = useState("");
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [syncMessage, setSyncMessage] = useState('');
      const [dailyPreviewData, setDailyPreviewData] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [isModalOpen, setIsModalOpen] = useState(false);

      const [globalAlert, setGlobalAlert] = useState({ isOpen: false, message: '' });
      const [globalConfirm, setGlobalConfirm] = useState({ isOpen: false, message: '', onConfirm: null });

      const fileInputRef = useRef(null);

      // (3) Effects
      useEffect(() => {
        localStorage.setItem('work_schedule_departments', JSON.stringify(departments));
        localStorage.setItem('work_schedule_staff', JSON.stringify(staff));
        localStorage.setItem('work_schedule_events', JSON.stringify(events));
      }, [departments, staff, events]);

      useEffect(() => {
        if (departments.length > 0 && !settingsNewStaff.department) {
          setSettingsNewStaff(prev => ({ ...prev, department: departments[0] }));
        }
      }, [departments]);

      // (4) Handlers
      const showAlert = (message) => setGlobalAlert({ isOpen: true, message: String(message) });
      const showConfirm = (message, onConfirm) => setGlobalConfirm({ isOpen: true, message: String(message), onConfirm });

      const [newEvent, setNewEvent] = useState({ name: '', type: '연가', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', details: '', location: '' });

      const handleSelectEvent = (event) => {
        const startD = formatDate(event.start), endD = formatDate(event.end), startT = formatTime(event.start), endT = formatTime(event.end);
        const period = startD === endD ? `${startD} [${startT} ~ ${endT}]` : `${startD} ${startT} ~ ${endD} ${endT}`;
        showAlert(`성명: ${event.name}\n복무: ${event.originalStatus || event.type}\n일시: ${period}\n사유: ${event.details || '-'}${event.location ? `\n장소: ${event.location}` : ''}`);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setNewEvent(prev => ({ ...prev, [name]: value }));
      };

      // 💡 [핵심 수정] 모바일(Safari/iOS)에서 확실하게 작동하는 Date 파싱 함수
      const handleSubmit = (e) => {
        e.preventDefault();
        
        const createSafeDate = (dStr, tStr) => {
          try {
            const ds = dStr || formatDate(new Date());
            const ts = tStr || '00:00';
            const [y, m, d] = ds.split('-');
            const [hr, min] = ts.split(':');
            const parsedDate = new Date(y, m - 1, d, hr, min);
            return isNaN(parsedDate.getTime()) ? new Date() : parsedDate;
          } catch(err) {
            return new Date();
          }
        };

        const startDateTime = createSafeDate(newEvent.date, newEvent.startTime);
        const endDateTime = createSafeDate(newEvent.date, newEvent.endTime);
        const displayName = newEvent.name || '본인';
        
        const newEventObj = {
          id: Date.now() + Math.random(), 
          name: String(displayName), 
          title: String(newEvent.title || `[${displayName}] ${newEvent.type}`),
          start: startDateTime, 
          end: endDateTime, 
          type: String(newEvent.type), 
          details: String(newEvent.details || ''), 
          location: String(newEvent.location || '')
        };

        setEvents(prev => {
          const filtered = prev.filter(ex => !(ex.name === newEventObj.name && formatDate(ex.start) === formatDate(newEventObj.start) && ex.type === newEventObj.type));
          return [...filtered, newEventObj];
        });
        
        setIsModalOpen(false);
        setNewEvent({ name: '', title: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: '' });
      };

      const deleteEvent = (id) => setEvents(events.filter(event => event.id !== id));

      const handleFileUpload = (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsSyncing(true); setSyncMessage('파일 로드 중...');
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const rows = []; let row = "", inQuotes = false;
            for (const char of text) { if (char === '"') inQuotes = !inQuotes; if (char === '\n' && !inQuotes) { rows.push(row.trim()); row = ""; } else row += char; }
            if (row) rows.push(row.trim());
            const lines = rows.filter(l => l.length > 0);
            const headers = parseCSVLine(lines[0]).map(h => h.replace(/\s/g, ''));
            const isDaily = headers.some(h => h.includes('근무상황')), isPeriod = headers.some(h => h.includes('종별'));
            if ((uploadSubTab === 'daily' && !isDaily) || (uploadSubTab === 'period' && !isPeriod)) {
              showAlert('선택한 탭과 파일 형식이 일치하지 않습니다.'); setIsSyncing(false); return;
            }
            const parsed = [];
            if (uploadSubTab === 'daily') {
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const obj = {}; headers.forEach((h, idx) => obj[h] = cur[idx] || '');
                if (obj['성명'] && obj['근무상황'] !== '정상근무') parsed.push({ name: obj['성명'], status: obj['근무상황'], period: obj['기간'], reason: obj['목적지'] || '-', department: obj['부서'], position: obj['직급/직위/직종'] });
              });
            } else {
              const nIdx = headers.findIndex(h => h.includes('성명')), pIdx = headers.findIndex(h => h.includes('기간')), tIdx = headers.findIndex(h => h.includes('종별')), rIdx = headers.findIndex(h => h.includes('사유')), dIdx = headers.findIndex(h => h.includes('부서명')), posIdx = headers.findIndex(h => h.includes('직급'));
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const rawN = cur[nIdx] || '', name = rawN.split(/[\r\n(]/)[0].trim(), status = cur[tIdx] || '';
                if (name && status && !status.includes('정상')) parsed.push({ name, status, period: cur[pIdx], reason: cur[rIdx] || '-', department: cur[dIdx], position: cur[posIdx] });
              });
            }
            setDailyPreviewData(parsed); setSyncMessage(`데이터 ${parsed.length}건 준비됨`);
          } catch(e) { setSyncMessage('분석 에러'); } finally { setIsSyncing(false); e.target.value = ''; }
        };
        reader.readAsText(file, 'utf-8');
      };

      const handleApplyUpdates = () => {
        const existingNames = new Set(staff.map(s => s.name));
        const newOnes = [];
        dailyPreviewData.forEach(p => { if (!existingNames.has(p.name)) { newOnes.push({ id: (Date.now() + Math.random()).toString(36), name: String(p.name), position: String(p.position || '-'), department: String(p.department || departments[0]) }); existingNames.add(p.name); } });
        const apply = () => {
          const newEvents = dailyPreviewData.map((p, i) => { const { start, end } = parseNeisPeriod(p.period); return { id: Date.now() + i, name: String(p.name), originalStatus: String(p.status), type: String(normalizeType(p.status)), start, end, details: String(p.reason), location: p.status.includes('출장') ? String(p.reason) : '' }; });
          setEvents(prev => { let updated = [...prev]; newEvents.forEach(ne => updated = updated.filter(ex => !(ex.name === ne.name && formatDate(ex.start) === formatDate(ne.start) && ex.type === ne.type))); return [...updated, ...newEvents]; });
          setDailyPreviewData([]); setSyncMessage(''); setViewMode('calendar');
        };
        if (newOnes.length > 0) showConfirm(`신규 근무자 ${newOnes.length}명을 명단에 추가하고 복무를 반영하시겠습니까?`, () => { setStaff([...staff, ...newOnes]); apply(); });
        else apply();
      };

      const generateAiReportFromList = async (filteredData) => {
        if (!filteredData.length) return showAlert("요약할 데이터가 없습니다.");
        setIsAiLoading(true);
        const dataStr = filteredData.map(e => `${e.name}: ${e.originalStatus || e.type} (${formatDate(e.start)})`).join('\n');
        try {
          const res = await callGemini(`${dataStr}\n\n위 복무 목록을 바탕으로 부재 현황 요약 리포트를 격식있게 작성해줘.`, "School Admin Reporting Bot");
          setAiReport(res);
        } catch (e) { 
          showAlert(`AI 리포트 생성 실패:\n${e.message}`); 
        } finally { 
          setIsAiLoading(false); 
        }
      };

      const generateAiReportFromOrg = async (staffStatuses) => {
        const activeToday = staffStatuses.filter(s => s.status !== '정상근무').map(s => `${s.name}(${s.position}): ${s.status} ${s.reason !== '-' ? `(${s.reason})` : ''}`).join('\n');
        if (!activeToday) return showAlert("선택한 날짜에 부재중인 근무자가 없습니다.");
        
        setIsAiLoading(true);
        const prompt = `날짜: ${orgSelectedDate}\n다음 부재자 현황을 관리자에게 보고할 정중한 요약 리포트로 작성해 주세요:\n${activeToday}`;
        try { 
          const res = await callGemini(prompt, "School Admin Expert."); 
          setAiReport(res); 
        } catch (e) { 
          showAlert(`AI 리포트 생성 실패:\n${e.message}`); 
        } finally { 
          setIsAiLoading(false); 
        }
      };

      const polishReasonWithAi = async () => {
        if (!newEvent.details) return showAlert("사유를 먼저 입력하세요.");
        setIsAiLoading(true);
        try {
          const res = await callGemini(`'${newEvent.details}' 사유를 나이스 행정용어로 다듬어줘. 결과만 짧게 한 줄로 출력해.`, "Formal Korean terms expert.");
          setNewEvent(prev => ({ ...prev, details: String(res.replace(/['"]/g, "").trim()) }));
        } catch (e) { 
          showAlert(`AI 교정 실패:\n${e.message}`); 
        } finally { 
          setIsAiLoading(false); 
        }
      };

      // --- 💡 Views ---
      const renderCalendar = () => {
        const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
        const firstDay = (y, m) => new Date(y, m, 1).getDay();
        const days = [];
        for (let i = 0; i < firstDay(currentMonth.getFullYear(), currentMonth.getMonth()); i++) days.push(<div key={`e-${i}`} className="min-h-[140px] bg-slate-50/50 border border-slate-100"></div>);
        for (let d = 1; d <= daysInMonth(currentMonth.getFullYear(), currentMonth.getMonth()); d++) {
          const dateStr = formatDate(new Date(currentMonth.getFullYear(), currentMonth.getMonth(), d));
          const dayEvents = events.filter(e => formatDate(e.start) <= dateStr && formatDate(e.end) >= dateStr);
          const sorted = [...dayEvents].sort((a,b) => {
            if (a.type !== b.type) return String(a.type).localeCompare(String(b.type), 'ko');
            return String(a.name).localeCompare(String(b.name), 'ko');
          });
          days.push(
            <div key={d} className="calendar-day bg-white border border-slate-100 p-3 hover:bg-blue-50/20 transition-colors cursor-pointer" onClick={() => { setNewEvent({...newEvent, date: dateStr}); setIsModalOpen(true); }}>
              <div className={`text-lg font-semibold w-10 h-10 flex items-center justify-center rounded-full mb-2 ${formatDate(new Date()) === dateStr ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-600'}`}><span>{d}</span></div>
              <div className="flex flex-col gap-1.5 overflow-hidden">
                {sorted.map(e => (
                  <div key={e.id} onClick={(ev) => { ev.stopPropagation(); handleSelectEvent(e); }} className={`text-[12px] px-2 py-1 rounded text-white truncate shadow-sm font-semibold ${CALENDAR_COLORS[e.type] || 'bg-slate-400'}`}>
                    <span>{String(e.name)}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        return (

                                      <input type="text" value={settingsEditStaffData.name} onChange={e => setSettingsEditStaffData({...settingsEditStaffData, name:e.target.value})} className="flex-1 border-2 border-slate-100 rounded-2xl px-4 font-semibold"/>
                                      <div className="flex gap-2">
                                         <button onClick={() => { setStaff(staff.map(i => i.id === s.id ? { ...i, name: settingsEditStaffData.name.trim(), position: settingsEditStaffData.position.trim() } : i)); setSettingsEditingStaffId(null); }} className="bg-emerald-600 text-white px-6 py-2 rounded-2xl font-bold transition-custom text-sm"><span>저장</span></button>
                                         <button onClick={() => setSettingsEditingStaffId(null)} className="bg-slate-100 text-slate-500 px-6 py-2 rounded-2xl font-bold transition-custom text-sm"><span>취소</span></button>
                                      </div>
                                   </div>
                                 ) : (
                                   <>
                                     <div className="flex items-center gap-6">
                                        <span className="w-32 sm:w-40 text-center text-[12px] font-semibold text-blue-700 bg-blue-50 py-2 rounded-xl border border-blue-100 truncate shadow-sm uppercase"><span>{String(s.position)}</span></span>
                                        <span className="text-xl font-medium text-slate-800"><span>{String(s.name)}</span></span>
                                     </div>
                                     <div className="flex items-center gap-2">
                                        <div className="flex border border-slate-100 rounded-2xl overflow-hidden mr-3 shadow-sm">
                                           <button onClick={() => { const i=staff.findIndex(item=>item.id===s.id); if(i>0){ const n=[...staff]; [n[i],n[i-1]]=[n[i-1],n[i]]; setStaff(n); }}} disabled={idx===0} className="px-4 py-2 hover:bg-slate-50 disabled:opacity-20"><i className="fa-solid fa-chevron-up text-xs"></i></button>
                                           <button onClick={() => { const i=staff.findIndex(item=>item.id===s.id); if(i<staff.length-1){ const n=[...staff]; [n[i],n[i+1]]=[n[i+1],n[i]]; setStaff(n); }}} disabled={idx===arr.length-1} className="px-4 py-2 border-l border-slate-100 hover:bg-slate-50 disabled:opacity-20"><i className="fa-solid fa-chevron-down text-xs"></i></button>
                                        </div>
                                        <button onClick={() => { setSettingsEditingStaffId(s.id); setSettingsEditStaffData({name:s.name, position:s.position}); }} className="text-slate-200 hover:text-blue-500 p-3 transition-custom"><i className="fa-solid fa-pen text-lg"></i></button>
                                        <button onClick={() => setStaff(staff.filter(i=>i.id!==s.id))} className="text-slate-200 hover:text-red-500 p-3 transition-custom"><i className="fa-solid fa-trash-can text-lg"></i></button>
                                     </div>
                                   </>
                                 )}
                              </li>
                            ))}
                         </ul>
                      </div>
                    ))}
                 </div>
              </div>
           </div>
      );

      const renderUploadView = () => (
        <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200 overflow-hidden animate-in slide-in-from-bottom-4 duration-500">
          <div className="bg-slate-50 p-8 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-8">
            <div className="flex items-center gap-6">
              <div className="p-5 bg-blue-600 text-white rounded-3xl flex items-center justify-center text-3xl shadow-xl shadow-blue-100"><i className="fa-solid fa-file-arrow-up"></i></div>
              <div><h3 className="text-2xl font-semibold">복무 데이터 대량 업로드</h3><p className="text-sm text-slate-400 font-medium mt-1">나이스 CSV 파일을 반영합니다.</p></div>
            </div>
            <div className="flex bg-slate-200/50 p-2 rounded-2xl w-full sm:w-auto overflow-x-auto hide-scrollbar shadow-inner">
              <button onClick={() => {setUploadSubTab('daily'); setDailyPreviewData([]); setSyncMessage('');}} className={`whitespace-nowrap px-8 py-3 text-sm font-semibold rounded-xl transition-all ${uploadSubTab === 'daily' ? 'bg-white shadow-lg text-blue-600' : 'text-gray-500'}`}><span>일일 현황</span></button>
              <button onClick={() => {setUploadSubTab('period'); setDailyPreviewData([]); setSyncMessage('');}} className={`whitespace-nowrap px-8 py-3 text-sm font-semibold rounded-xl transition-all ${uploadSubTab === 'period' ? 'bg-white shadow-lg text-blue-600' : 'text-gray-500'}`}><span>기간별 현황</span></button>
            </div>
          </div>
          <div className="py-24 flex flex-col items-center justify-center bg-blue-50/10 border-b border-slate-100 border-dashed m-8 rounded-[3rem] border-4">
            <p className="text-lg font-semibold text-slate-700 mb-3 text-center px-6"><span>{uploadSubTab === 'daily' ? '[일일근무상황조회] 화면의 파일을 선택하세요.' : '[근무상황관리] 또는 [기간별복무조회] 파일을 선택하세요.'}</span></p>
            <p className="text-sm text-slate-400 mb-12 text-center px-8 leading-relaxed">모든 연도와 월의 데이터가 정확히 처리됩니다. 동일 날짜/유형은 덮어쓰기 됩니다.</p>
            <input type="file" accept=".csv" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
            <button onClick={() => fileInputRef.current.click()} disabled={isSyncing} className="group relative bg-blue-600 text-white px-16 py-6 rounded-[2rem] font-bold shadow-2xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95 text-xl">
               <i className="fa-solid fa-file-arrow-up mr-4"></i>
               <span>CSV 파일 불러오기</span>
            </button>
            {syncMessage && <p className="mt-12 text-lg text-blue-700 font-semibold bg-blue-100 px-8 py-4 rounded-3xl animate-bounce flex items-center gap-3 shadow-sm border border-blue-200 font-medium"><i className="fa-solid fa-circle-check text-2xl"></i>{String(syncMessage)}</p>}
          </div>
          {dailyPreviewData.length > 0 && (
            <div className="p-8 lg:p-12 animate-in fade-in duration-500 border-t border-slate-50">
              <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-6">
                <h4 className="font-semibold text-slate-800 text-2xl">가져온 데이터 미리보기 ({dailyPreviewData.length}건)</h4>
                <button onClick={handleApplyUpdates} className="w-full sm:w-auto bg-emerald-600 text-white px-12 py-4 rounded-[1.5rem] font-bold shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all flex items-center justify-center gap-3 text-lg"><i className="fa-solid fa-circle-check text-xl"></i>복무 현황 최종 반영</button>
              </div>
              <div className="overflow-x-auto border-2 border-slate-50 rounded-[2.5rem]">
                <table className="min-w-full divide-y divide-slate-100 text-base">
                  <thead className="bg-slate-50/50 text-xs font-bold">
                    <tr><th className="px-8 py-5 text-center">성명</th><th className="px-8 py-5 text-center">상황</th><th className="px-8 py-5 text-center">기간</th><th className="px-8 py-5 text-left">비고</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50 bg-white font-medium">
                    {dailyPreviewData.map((d, i) => (
                      <tr key={i} className="hover:bg-slate-50/50 transition-custom">
                        <td className="px-8 py-5 font-semibold text-center text-slate-800 text-xl">{String(d.name)}</td>
                        <td className="px-8 py-5 text-center whitespace-nowrap"><span className={`px-4 py-1 rounded-xl border-2 text-xs font-semibold ${TYPE_COLORS[normalizeType(d.status)] || 'bg-slate-50'}`}>{String(d.status)}</span></td>
                        <td className="px-8 py-5 text-center text-slate-500 font-semibold whitespace-nowrap font-bold">{String(d.period)}</td>
                        <td className="px-8 py-5 truncate max-w-[300px] text-slate-400 text-sm font-normal">{String(d.reason)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );

      return (
        <div className="min-h-screen pb-32">
          <header className="bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-40 shadow-sm h-20 lg:h-24 flex items-center">
            <div className="max-w-7xl mx-auto px-6 w-full flex items-center justify-between">
              <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setViewMode('calendar')}>
                <div className="w-12 h-12 lg:w-14 lg:h-14 bg-blue-600 rounded-[1.25rem] flex items-center justify-center text-white text-2xl shadow-2xl shadow-blue-200 group-hover:rotate-12 transition-transform duration-500"><i className="fa-solid fa-calendar-days"></i></div>
                <div><h1 className="text-2xl lg:text-3xl font-bold text-slate-800 tracking-tighter leading-none"><span>WorkSync</span> <span className="text-blue-600">Pro</span></h1><p className="text-[11px] text-slate-400 font-semibold uppercase mt-2 tracking-widest hidden sm:block">Admin Management</p></div>
              </div>
              <nav className="hidden lg:flex gap-3">
                {[
                  { id: 'calendar', icon: 'fa-calendar', label: '근무 달력' },
                  { id: 'list', icon: 'fa-list', label: '전체 목록' },
                  { id: 'organization', icon: 'fa-building', label: '기관 현황' },
                  { id: 'upload', icon: 'fa-file-arrow-up', label: '복무 업로드' },
                  { id: 'settings', icon: 'fa-gear', label: '인사 설정' }
                ].map(item => (
                  <button key={item.id} onClick={() => setViewMode(item.id)} className={`px-6 py-3 rounded-2xl text-[16px] font-bold flex items-center gap-3 transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'}`}><i className={`fa-solid ${item.icon} text-base`}></i><span>{item.label}</span></button>
                ))}
              </nav>
              <button onClick={() => setIsModalOpen(true)} className="hidden sm:flex bg-slate-900 text-white px-10 py-4 rounded-3xl font-bold shadow-2xl hover:bg-slate-800 active:scale-95 transition-all text-base"><i className="fa-solid fa-plus mr-3"></i><span>복무 신청</span></button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-12">
             {viewMode === 'calendar' && renderCalendar()}
             {viewMode === 'list' && renderListView()}
             {viewMode === 'organization' && renderOrganizationView()}
             {viewMode === 'upload' && renderUploadView()}
             {viewMode === 'settings' && renderSettingsView()}
          </main>

          <div className="lg:hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md px-5 py-4 rounded-[3rem] shadow-[0_25px_60px_rgba(0,0,0,0.2)] flex items-center gap-3 border border-slate-100 z-50">
             {[{id:'calendar', i:'fa-calendar'}, {id:'list', i:'fa-list'}, {id:'organization', i:'fa-building'}, {id:'upload', i:'fa-file-arrow-up'}, {id:'settings', i:'fa-gear'}].map(item => (
               <button key={item.id} onClick={() => setViewMode(item.id)} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-200' : 'text-slate-400'}`}><i className={`fa-solid ${item.i} text-xl`}></i></button>
             ))}
             <div className="w-[2px] h-8 bg-slate-200 mx-2"></div>
             <button onClick={() => setIsModalOpen(true)} className="w-12 h-12 bg-slate-900 text-white flex items-center justify-center rounded-full shadow-xl active:scale-90"><i className="fa-solid fa-plus text-xl"></i></button>
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-md animate-in fade-in duration-300" onClick={() => setIsModalOpen(false)}></div>
              <div className="bg-white rounded-[3.5rem] shadow-[0_35px_80px_rgba(0,0,0,0.4)] z-10 w-full max-w-2xl overflow-hidden animate-in zoom-in duration-300 border border-slate-100">
                <form onSubmit={handleSubmit}>
                  <div className="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                    <h3 className="font-semibold text-slate-800 text-3xl tracking-tight"><i className="fa-solid fa-plus text-blue-600 mr-4"></i><span>수동 복무 등록</span></h3>
                    <button type="button" onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-600 p-2"><i className="fa-solid fa-xmark text-4xl"></i></button>
                  </div>
                  <div className="p-10 lg:p-14 space-y-10 overflow-y-auto max-h-[70vh] hide-scrollbar font-medium">
                    <div className="space-y-4">
                      <label className="text-base font-semibold text-slate-400 uppercase tracking-widest ml-2"><span>대상자 성명</span></label>
                      <input type="text" name="name" value={newEvent.name} onChange={handleInputChange} placeholder="성명 입력" required className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none shadow-sm transition-all"/>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                       <div className="space-y-4">
                         <label className="text-base font-semibold text-slate-400 uppercase tracking-widest ml-2"><span>복무 종류</span></label>
                         <select name="type" value={newEvent.type} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none bg-white appearance-none">
                           {WORK_TYPES.map(t => <option key={t} value={t}><span>{t}</span></option>)}
                         </select>
                       </div>
                       <div className="space-y-4">
                         <label className="text-base font-semibold text-slate-400 uppercase tracking-widest ml-2"><span>조회 날짜</span></label>
                         <input type="date" name="date" value={newEvent.date} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none"/>
                       </div>
                    </div>
                    <div className="flex gap-8">
                       <div className="flex-1 space-y-4"><label className="text-base font-semibold text-slate-400 uppercase tracking-widest ml-2"><span>시작 시간</span></label><input type="time" name="startTime" value={newEvent.startTime} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none"/></div>
                       <div className="flex-1 space-y-4"><label className="text-base font-semibold text-slate-400 uppercase tracking-widest ml-2"><span>종료 시간</span></label><input type="time" name="endTime" value={newEvent.endTime} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none"/></div>
                    </div>
                    <div className="space-y-4">
                      <div className="flex justify-between items-center ml-2">
                        <label className="text-base font-semibold text-slate-400 uppercase tracking-widest"><span>상세 사유 및 용무</span></label>
                        <button type="button" onClick={polishReasonWithAi} disabled={isAiLoading} className="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-custom flex items-center gap-2 border border-indigo-100 bg-indigo-50 px-4 py-2 rounded-xl shadow-sm"><i className={isAiLoading ? "fa-solid fa-spinner animate-spin" : "fa-solid fa-sparkles"}></i><span>✨ AI 행정용어 교정</span></button>
                      </div>
                      <textarea rows="3" name="details" value={newEvent.details} onChange={handleInputChange} placeholder="사유를 자유롭게 입력하세요" className="w-full border-2 border-slate-100 rounded-[2rem] p-6 text-2xl font-semibold focus:border-blue-500 outline-none shadow-sm transition-all bg-white resize-none font-medium"/>
                    </div>
                  </div>
                  <div className="p-10 bg-slate-50/50 border-t border-slate-100 flex gap-6">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-6 border-2 border-slate-200 rounded-3xl font-semibold text-slate-400 hover:bg-white hover:text-slate-600 transition-custom text-xl"><span>취소</span></button>
                    <button type="submit" className="flex-1 py-6 bg-blue-600 text-white rounded-3xl font-bold shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all text-xl active:scale-95"><span>복무 등록 완료</span></button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {globalAlert.isOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-md animate-in fade-in duration-200" onClick={() => setGlobalAlert({isOpen: false, message: ''})}></div>
              <div className="bg-white rounded-[4rem] shadow-[0_40px_100px_rgba(0,0,0,0.5)] w-full max-w-lg p-12 lg:p-16 text-center animate-in zoom-in duration-300 relative border border-slate-50 font-medium">
                 <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center text-5xl mx-auto mb-10 shadow-inner"><i className="fa-solid fa-circle-exclamation"></i></div>
                 <h3 className="text-3xl font-semibold text-slate-800 mb-8 tracking-tight"><span>알림</span></h3>
                 <div className="bg-slate-50/50 p-8 rounded-[2rem] border-2 border-slate-50 mb-12"><p className="text-2xl font-semibold text-slate-700 leading-relaxed whitespace-pre-wrap tracking-tighter"><span>{String(globalAlert.message)}</span></p></div>
                 <button onClick={() => setGlobalAlert({isOpen: false, message: ''})} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-semibold shadow-2xl hover:bg-slate-800 transition-all text-xl active:scale-95 tracking-widest uppercase"><span>OK, 확인했습니다</span></button>
              </div>
            </div>
          )}

          {globalConfirm.isOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-md animate-in fade-in duration-200" onClick={() => setGlobalConfirm({isOpen: false, message: '', onConfirm: null})}></div>
              <div className="bg-white rounded-[4rem] shadow-[0_40px_100px_rgba(0,0,0,0.5)] w-full max-w-lg p-12 lg:p-16 text-center animate-in zoom-in duration-300 relative border border-slate-50 font-medium">
                 <div className="w-24 h-24 bg-orange-50 text-orange-600 rounded-[2.5rem] flex items-center justify-center text-5xl mx-auto mb-10 shadow-inner"><i className="fa-solid fa-circle-question"></i></div>
                 <h3 className="text-3xl font-semibold text-slate-800 mb-8 tracking-tight"><span>확인이 필요합니다</span></h3>
                 <div className="bg-slate-50/50 p-8 rounded-[2rem] border-2 border-slate-50 mb-12"><p className="text-2xl font-bold text-slate-700 leading-relaxed whitespace-pre-wrap tracking-tighter italic"><span>{String(globalConfirm.message)}</span></p></div>
                 <div className="flex gap-4">
                    <button onClick={() => setGlobalConfirm({isOpen: false, message: '', onConfirm: null})} className="flex-1 bg-slate-100 text-slate-500 py-6 rounded-[2rem] font-semibold hover:bg-slate-200 transition-all text-xl active:scale-95"><span>취소</span></button>
                    <button onClick={() => { if(globalConfirm.onConfirm) globalConfirm.onConfirm(); setGlobalConfirm({isOpen: false, message: '', onConfirm: null}); }} className="flex-1 bg-blue-600 text-white py-6 rounded-[2rem] font-bold shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all text-xl active:scale-95"><span>진행하기</span></button>
                 </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
