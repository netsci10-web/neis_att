<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkSync Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons (lucide-react 대체) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-blue-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Error Boundary ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
              <div className="max-w-lg w-full p-12 text-center bg-white border border-slate-200 rounded-[3rem] shadow-2xl">
                <i className="fa-solid fa-circle-exclamation text-7xl text-red-500 mx-auto mb-8 block"></i>
                <h2 className="text-3xl font-bold text-slate-900 mb-4">앱 실행 오류</h2>
                <p className="text-slate-500 mb-10 leading-relaxed text-lg font-medium">
                  데이터 설정 중 충돌이 발생했습니다.<br/>아래 버튼을 눌러 초기화 후 다시 시작해 주세요.
                </p>
                <button 
                  onClick={() => { localStorage.clear(); window.location.reload(); }} 
                  className="w-full bg-slate-900 text-white py-6 rounded-2xl font-bold hover:bg-slate-800 transition-all text-xl shadow-xl active:scale-95"
                >
                  전체 데이터 초기화 및 재시작
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Gemini AI Config ---
    const GEMINI_MODEL = "gemini-2.5-flash"; 
    const callGemini = async (prompt, systemInstruction = "") => {
      const apiKey = localStorage.getItem('gemini_api_key') || "";
      if (!apiKey) throw new Error('API 키가 등록되지 않았습니다. [인사 설정]에서 등록해 주세요.');
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction || "School admin expert." }] }
      };
      const maxRetries = 5;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!response.ok) throw new Error("API 호출 에러");
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
        }
      }
    };

    // --- Utilities ---
    const formatDate = (date) => {
      if (!date || !(date instanceof Date) || isNaN(date.getTime())) return "";
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const formatTime = (date) => {
      if (!date || !(date instanceof Date) || isNaN(date.getTime())) return "00:00";
      return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    };

    const parseCSVLine = (line) => {
      const result = []; let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else current += char;
      }
      result.push(current.trim());
      return result;
    };

    const escapeCSV = (str) => {
      if (str == null) return '""';
      const s = String(str).replace(/"/g, '""');
      return `"${s}"`;
    };

    const normalizePosition = (pos) => {
      if (!pos) return '-';
      let p = String(pos).trim();
      return p.replace(/초등학교교사/g, '교사');
    };

    const getPositionWeight = (position) => {
      if (!position) return 99;
      const p = position.trim();
      if (p.includes('교장')) return 1;
      if (p.includes('교감')) return 2;
      if (p.includes('실무원') || p.includes('상담사') || p.includes('공무직') || p.includes('조리사')) return 8;
      if (p.includes('특수교사') || p.includes('보건교사') || p.includes('영양교사') || p.includes('사서교사') || p.includes('상담교사')) return 4;
      if (p.includes('교사')) return 3;
      if (p.includes('행정실장')) return 5;
      if (p.includes('지방교육행정주사') || p.includes('주무관')) return 6;
      return 10;
    };

    const normalizeType = (status) => {
      if (!status) return '기타';
      const s = String(status).replace(/\s/g, '');
      if (s.includes('41조')) return '41조';
      if (s.includes('특별휴가') || s.includes('장기재직') || s.includes('경조사') || s.includes('포상') || s.includes('학습')) return '특별휴가';
      if (s.includes('병가') || s.includes('병조퇴')) return '병가';
      if (s.includes('연가') || s.includes('휴가')) return '연가';
      if (s.includes('출장')) return '출장';
      if (s.includes('조퇴')) return '조퇴';
      if (s.includes('외출')) return '외출';
      if (s.includes('공가')) return '공가';
      if (s.includes('정상')) return '정상근무';
      return '기타';
    };

    const getTypeWeight = (type) => {
      const t = normalizeType(type);
      switch (t) {
        case '연가': return 1;
        case '병가': return 2;
        case '공가': return 3;
        case '특별휴가': return 4;
        case '41조': return 5;
        case '출장': return 6;
        case '기타': return 7;
        case '조퇴': return 8;
        case '외출': return 9;
        default: return 99;
      }
    };

    const TYPE_COLORS = {
      '연가': 'bg-blue-50 text-blue-600 border-blue-100',
      '병가': 'bg-red-50 text-red-600 border-red-100',
      '공가': 'bg-purple-50 text-purple-600 border-purple-100',
      '특별휴가': 'bg-pink-50 text-pink-600 border-pink-100',
      '41조': 'bg-teal-50 text-teal-600 border-teal-100',
      '출장': 'bg-emerald-50 text-emerald-600 border-emerald-100',
      '조퇴': 'bg-amber-50 text-amber-600 border-amber-100',
      '외출': 'bg-orange-50 text-orange-600 border-orange-100',
      '정상근무': 'bg-slate-50 text-gray-400 border-slate-100'
    };

    const CALENDAR_COLORS = {
      '연가': 'bg-blue-500', '병가': 'bg-red-500', '공가': 'bg-purple-500', 
      '특별휴가': 'bg-pink-500', '41조': 'bg-teal-500', '출장': 'bg-emerald-500', 
      '조퇴': 'bg-amber-500', '외출': 'bg-orange-500', '기타': 'bg-slate-400'
    };

    const WORK_TYPES = ['연가', '병가', '공가', '특별휴가', '41조', '조퇴', '외출', '출장', '기타'];

    // --- Main App Component ---
    function AppContent() {
      const [viewMode, setViewMode] = useState('calendar');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      
      const [departments, setDepartments] = useState(() => {
        try { return JSON.parse(localStorage.getItem('work_schedule_departments')) || ['마산중앙초등학교']; } 
        catch(e) { return ['마산중앙초등학교']; }
      });
      const [staff, setStaff] = useState(() => {
        try { return JSON.parse(localStorage.getItem('work_schedule_staff')) || []; } 
        catch(e) { return []; }
      });
      const [events, setEvents] = useState(() => {
        try {
          const saved = localStorage.getItem('work_schedule_events');
          if (!saved) return [];
          return JSON.parse(saved).map(e => ({ 
            ...e, 
            start: new Date(e.start), 
            end: new Date(e.end),
            type: normalizeType(e.originalStatus || e.type)
          })).filter(e => !isNaN(e.start.getTime())); 
        } catch(err) { return []; }
      });

      const [appliedFilter, setAppliedFilter] = useState({ name: '', type: '전체', start: '', end: '' });
      const listNameInputRef = useRef(null);

      const [orgSelectedDate, setOrgSelectedDate] = useState(formatDate(new Date()));
      const [orgFilterStatus, setOrgFilterStatus] = useState('전체');
      const [deptFilters, setDeptFilters] = useState({});

      const [settingsNewDept, setSettingsNewDept] = useState('');
      const [settingsNewStaff, setSettingsNewStaff] = useState({ name: '', position: '', department: '' });
      const [settingsEditingStaffId, setSettingsEditingStaffId] = useState(null);
      const [settingsEditStaffData, setSettingsEditStaffData] = useState({ name: '', position: '' });
      const [settingsGeminiKey, setSettingsGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');

      const [aiReport, setAiReport] = useState("");
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [uploadSubTab, setUploadSubTab] = useState('daily');
      const [dailyPreviewData, setDailyPreviewData] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncMessage, setSyncMessage] = useState('');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [globalAlert, setGlobalAlert] = useState({ isOpen: false, message: '', align: 'center' });
      const [globalConfirm, setGlobalConfirm] = useState({ isOpen: false, message: '', onConfirm: null });

      const fileInputRef = useRef(null);
      const backupFileInputRef = useRef(null);

      useEffect(() => {
        localStorage.setItem('work_schedule_departments', JSON.stringify(departments));
        localStorage.setItem('work_schedule_staff', JSON.stringify(staff));
        localStorage.setItem('work_schedule_events', JSON.stringify(events));
      }, [departments, staff, events]);

      const showAlert = (message, align = 'center') => setGlobalAlert({ isOpen: true, message: String(message), align });
      const showConfirm = (message, onConfirm) => setGlobalConfirm({ isOpen: true, message: String(message), onConfirm });

      const [newEvent, setNewEvent] = useState({ name: '', type: '연가', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', details: '', location: '' });

      const handleSelectEvent = (event) => {
        const startD = formatDate(event.start), endD = formatDate(event.end);
        const startT = formatTime(event.start), endT = formatTime(event.end);
        const period = startD === endD ? `${startD} [${startT} ~ ${endT}]` : `${startD} ${startT} ~ ${endD} ${endT}`;
        const currentStaff = staff.find(s => s.name === event.name);
        const position = currentStaff ? currentStaff.position : (event.position || '-');
        showAlert(`· 직위: ${position}\n· 성명: ${event.name}\n· 복무: ${event.originalStatus || event.type}\n· 일시: ${period}\n· 사유: ${event.details || '-'}${event.location ? `\n· 장소: ${event.location}` : ''}`, 'left');
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setNewEvent(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const createSafeDate = (dStr, tStr) => {
          try {
            const [y, m, d] = (dStr || formatDate(new Date())).split('-').map(Number);
            const [hr, min] = (tStr || '09:00').split(':').map(Number);
            return new Date(y, m - 1, d, hr, min);
          } catch(err) { return new Date(); }
        };
        const start = createSafeDate(newEvent.date, newEvent.startTime);
        const end = createSafeDate(newEvent.date, newEvent.endTime);
        const displayName = (newEvent.name || '본인').trim();
        const existingStaff = staff.find(s => s.name === displayName);
        
        const newEventObj = {
          id: Date.now() + Math.random(), 
          name: String(displayName), 
          position: existingStaff ? existingStaff.position : '-',
          originalStatus: String(newEvent.type),
          type: normalizeType(newEvent.type),
          start, end, 
          details: String(newEvent.details || ''), 
          location: String(newEvent.location || '')
        };
        setEvents(prev => [...prev.filter(ex => !(ex.name === newEventObj.name && formatDate(ex.start) === formatDate(newEventObj.start) && ex.type === newEventObj.type)), newEventObj]);
        setIsModalOpen(false);
        setNewEvent({ name: '', date: formatDate(new Date()), startTime: '09:00', endTime: '17:00', type: '연가', details: '', location: '' });
      };

      const deleteEvent = (id) => setEvents(events.filter(e => e.id !== id));

      const handleClearEvents = () => {
        showConfirm("모든 복무 기록을 완전히 삭제하시겠습니까?\n(인원 명단은 유지됩니다.)", () => { setEvents([]); showAlert("초기화되었습니다."); });
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsSyncing(true); setSyncMessage('파일 분석 중...');
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const rows = []; let row = "", inQuotes = false;
            for (const char of text) { if (char === '"') inQuotes = !inQuotes; if (char === '\n' && !inQuotes) { rows.push(row.trim()); row = ""; } else row += char; }
            if (row) rows.push(row.trim());
            const lines = rows.filter(l => l.length > 0);
            const headers = parseCSVLine(lines[0]).map(h => h.replace(/\s/g, ''));
            const approvalIdx = headers.findIndex(h => h.includes('승인') || h.includes('결재') || h.includes('상태'));
            const parsed = [];
            if (uploadSubTab === 'daily') {
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const obj = {}; headers.forEach((h, idx) => obj[h] = cur[idx] || '');
                const appStatus = approvalIdx !== -1 ? (cur[approvalIdx] || '') : '완결';
                if (obj['성명'] && obj['근무상황'] !== '정상근무' && appStatus.includes('완결')) {
                  const ex = staff.find(s => s.name === obj['성명'].trim());
                  parsed.push({ name: obj['성명'].trim(), status: obj['근무상황'], period: obj['기간'], reason: obj['목적지'] || '-', department: ex?.department || obj['부서'], position: ex?.position || normalizePosition(obj['직급/직위/직종']) });
                }
              });
            } else {
              const nIdx = headers.findIndex(h => h.includes('성명')), pIdx = headers.findIndex(h => h.includes('기간')), tIdx = headers.findIndex(h => h.includes('종별')), rIdx = headers.findIndex(h => h.includes('사유')), posIdx = headers.findIndex(h => h.includes('직급'));
              lines.slice(1).forEach(line => {
                const cur = parseCSVLine(line); const name = (cur[nIdx] || '').split(/[\r\n(]/)[0].trim(), status = cur[tIdx] || '';
                const appStatus = approvalIdx !== -1 ? (cur[approvalIdx] || '') : '완결';
                if (name && status && !status.includes('정상') && appStatus.includes('완결')) {
                  const ex = staff.find(s => s.name === name);
                  parsed.push({ name, status, period: cur[pIdx], reason: cur[rIdx] || '-', department: ex?.department || '-', position: ex?.position || normalizePosition(cur[posIdx]) });
                }
              });
            }
            setDailyPreviewData(parsed); setSyncMessage(`${parsed.length}건 분석 완료`);
          } catch(e) { setSyncMessage('분석 오류'); } finally { setIsSyncing(false); e.target.value = ''; }
        };
        reader.readAsText(file, 'utf-8');
      };

      const handleApplyUpdates = () => {
        const existingNames = new Set(staff.map(s => s.name));
        const newOnes = [];
        dailyPreviewData.forEach(p => { if (!existingNames.has(p.name)) { newOnes.push({ id: Math.random().toString(36), name: p.name, position: p.position, department: p.department || departments[0] }); existingNames.add(p.name); } });
        const apply = () => {
          const robustParse = (str) => { const m = str?.match(/\d+/g); return (m && m.length >= 3) ? new Date(m[0], m[1]-1, m[2], m[3]||0, m[4]||0) : null; };
          const newEvents = dailyPreviewData.map((p, i) => {
            const parts = p.period.split('~').map(s => s.trim());
            const start = robustParse(parts[0]) || new Date();
            const end = parts[1] ? robustParse(parts[1]) : start;
            return { id: Date.now() + i + Math.random(), name: p.name, position: staff.find(s=>s.name===p.name)?.position || p.position, originalStatus: p.status, type: normalizeType(p.status), start, end, details: p.reason, location: p.status.includes('출장') ? p.reason : '' };
          });
          setEvents(prev => {
            let updated = [...prev];
            newEvents.forEach(ne => updated = updated.filter(ex => !(ex.name === ne.name && formatDate(ex.start) === formatDate(ne.start) && ex.type === ne.type)));
            return [...updated, ...newEvents];
          });
          setDailyPreviewData([]); setSyncMessage(''); setViewMode('calendar');
        };
        if (newOnes.length > 0) showConfirm(`신규 인원 ${newOnes.length}명을 명단에 등록할까요?`, () => { setStaff(s => [...s, ...newOnes]); apply(); });
        else apply();
      };

      const handleExportBackup = () => {
        let csvContent = "\uFEFFType,ID,Name,StartISO,EndISO,TypeNormalized,OriginalStatus,Details,Location\n";
        departments.forEach(d => { csvContent += `DEPT,${escapeCSV(d)}\n`; });
        staff.forEach(s => { csvContent += `STAFF,${escapeCSV(s.id)},${escapeCSV(s.department)},${escapeCSV(s.position)},${escapeCSV(s.name)}\n`; });
        events.forEach(e => { csvContent += `EVENT,${escapeCSV(e.id)},${escapeCSV(e.name)},${escapeCSV(e.start.toISOString())},${escapeCSV(e.end.toISOString())},${escapeCSV(e.type)},${escapeCSV(e.originalStatus)},${escapeCSV(e.details)},${escapeCSV(e.location)}\n`; });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const now = new Date();
        const timeStr = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
        link.href = URL.createObjectURL(blob);
        link.download = `WorkSync_Backup_${formatDate(now)}_${timeStr}.csv`;
        link.click();
        showAlert('백업 파일이 다운로드되었습니다.');
      };

      const handleImportBackup = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const rows = event.target.result.split('\n').map(r => r.trim()).filter(r => r.length > 0);
            const newDepts = [], newStaff = [], newEvents = [];
            rows.forEach(r => {
              if (r.startsWith('Type,')) return;
              const cols = parseCSVLine(r);
              if(cols[0] === 'DEPT') newDepts.push(cols[1]);
              else if(cols[0] === 'STAFF') newStaff.push({ id: cols[1], department: cols[2], position: normalizePosition(cols[3]), name: cols[4] });
              else if(cols[0] === 'EVENT') newEvents.push({ id: cols[1], name: cols[2], start: new Date(cols[3]), end: new Date(cols[4]), type: normalizeType(cols[6] || cols[5]), originalStatus: cols[6] || cols[5], details: cols[7], location: cols[8] });
            });
            if(newDepts.length > 0 || newStaff.length > 0 || newEvents.length > 0) {
              showConfirm("기존 데이터를 모두 지우고 복원할까요?", () => { setDepartments(newDepts.length > 0 ? newDepts : departments); setStaff(newStaff); setEvents(newEvents); showAlert('복원 완료'); });
            }
          } catch(err) { showAlert('파일 오류'); } finally { e.target.value = ''; }
        };
        reader.readAsText(file, 'utf-8');
      };

      const filteredListEvents = useMemo(() => {
        const searchName = (appliedFilter.name || '').trim();
        return events.filter(e => {
          const matchN = String(e.name || '').includes(searchName);
          const matchT = appliedFilter.type === '전체' || e.type === appliedFilter.type;
          const matchD = (!appliedFilter.start || formatDate(e.end) >= appliedFilter.start) && (!appliedFilter.end || formatDate(e.start) <= appliedFilter.end);
          return matchN && matchT && matchD;
        }).sort((a,b) => b.start.getTime() - a.start.getTime());
      }, [events, appliedFilter]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-32">
          <header className="bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-40 h-20 lg:h-24 flex items-center shadow-sm">
            <div className="max-w-7xl mx-auto px-6 w-full flex items-center justify-between">
              <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setViewMode('calendar')}>
                <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl group-hover:rotate-12 transition-transform">
                  <i className="fa-solid fa-calendar-days text-2xl"></i>
                </div>
                <div><h1 className="text-2xl font-bold tracking-tighter">WorkSync <span className="text-blue-600">Pro</span></h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest hidden sm:block">Admin Management</p></div>
              </div>
              <nav className="hidden lg:flex gap-3">
                {[

                  <div className="p-8 lg:p-12 animate-in fade-in border-t-2">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-6"><h4 className="font-black text-3xl text-slate-800">미리보기 ({dailyPreviewData.length}건)</h4><button onClick={handleApplyUpdates} className="bg-emerald-600 text-white px-12 py-5 rounded-[2rem] font-black shadow-xl flex items-center gap-3 text-xl active:scale-95 transition-all"><i className="fa-solid fa-circle-check text-xl"></i>복무 최종 반영</button></div>
                    <div className="overflow-x-auto border-2 rounded-[2.5rem]"><table className="min-w-full divide-y-2 text-center text-base"><thead className="bg-slate-50/50 text-xs font-black text-slate-500"><tr><th>성명</th><th>종류</th><th>기간</th><th className="text-left">비고</th></tr></thead><tbody className="divide-y-2 divide-slate-50 bg-white">{dailyPreviewData.map((d, i) => (<tr key={i} className="hover:bg-slate-50/50"><td className="px-8 py-5 font-black text-2xl text-slate-800">{d.name}</td><td><span className={`px-4 py-1.5 rounded-xl border-2 text-xs font-black ${TYPE_COLORS[normalizeType(d.status)]}`}>{d.status}</span></td><td className="text-slate-500 font-bold">{d.period}</td><td className="text-left truncate max-w-[300px] text-slate-400 font-bold">{d.reason}</td></tr>))}</tbody></table></div>
                  </div>
                )}
              </div>
            )}

            {viewMode === 'settings' && (
              <div className="space-y-12 animate-in fade-in">
                 <div className="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm">
                   <div className="flex justify-between items-center mb-10"><h4 className="text-2xl font-black text-indigo-700 flex items-center gap-3"><i className="fa-solid fa-gear text-3xl"></i>Gemini AI API 설정</h4></div>
                   <div className="flex gap-4"><input type="password" value={settingsGeminiKey} onChange={e => setSettingsGeminiKey(e.target.value)} placeholder="API Key 입력" className="flex-1 border-2 border-slate-100 rounded-3xl px-8 text-lg font-mono outline-none focus:ring-2 focus:ring-indigo-500"/><button onClick={() => { localStorage.setItem('gemini_api_key', settingsGeminiKey.trim()); showAlert('저장되었습니다.'); }} className="bg-indigo-600 text-white px-12 rounded-3xl font-black shadow-xl active:scale-95 text-lg transition-all">저장</button></div>
                 </div>
                 <div className="bg-white rounded-[3.5rem] border border-slate-200 overflow-hidden">
                   <div className="p-12 border-b bg-slate-50/30 flex flex-col sm:flex-row justify-between items-center gap-8"><h3 className="text-4xl font-black text-slate-800">조직 인원 설정</h3><div className="flex gap-3"><button onClick={() => setStaff(s => [...s].sort((a,b) => a.name.localeCompare(b.name, 'ko')))} className="px-8 py-4 border-2 rounded-2xl font-bold bg-white active:scale-95 transition-all">이름순</button><button onClick={() => setStaff(s => [...s].sort((a,b) => (getPositionWeight(a.position) - getPositionWeight(b.position)) || a.name.localeCompare(b.name, 'ko')))} className="px-8 py-4 bg-blue-50 text-blue-600 rounded-2xl font-black border-2 border-blue-100 active:scale-95 transition-all">직위순</button><button onClick={() => showConfirm("전체 인원 설정을 초기화할까요?", () => { setDepartments(['마산중앙초등학교']); setStaff([]); })} className="px-8 py-4 bg-red-50 text-red-600 rounded-2xl font-black border-2 border-red-100 active:scale-95 text-sm">전체삭제</button></div></div>
                   <div className="p-12 space-y-12">
                     <div className="flex gap-4"><input type="text" value={settingsNewDept} onChange={e => setSettingsNewDept(e.target.value)} placeholder="새 부서 명칭" className="flex-1 border-2 border-slate-200 rounded-[2rem] px-8 text-xl font-bold outline-none"/><button onClick={() => { if(settingsNewDept.trim()){ setDepartments(d => [...new Set([...d, settingsNewDept.trim()])]); setSettingsNewDept(''); } }} className="bg-slate-900 text-white px-12 rounded-[2rem] font-black text-xl active:scale-95">추가</button></div>
                     {departments.map(dept => {
                       const currentF = deptFilters[dept] || { name: '', pos: '전체' };
                       return (
                       <div key={dept} className="border-4 border-slate-50 rounded-[3rem] overflow-hidden mb-12 shadow-sm animate-in slide-in-from-bottom-2">
                         <div className="bg-slate-50 px-10 py-6 border-b-2 flex justify-between items-center"><span className="font-black text-2xl text-slate-700">{dept}</span><button onClick={() => showConfirm(`부서와 소속 인원을 삭제할까요?`, () => { setDepartments(departments.filter(d=>d!==dept)); setStaff(staff.filter(s=>s.department!==dept)); })} className="text-slate-300 hover:text-red-500 p-2"><i className="fa-solid fa-trash-can text-xl"></i></button></div>
                         <div className="p-8 bg-slate-50/20 border-b-2"><form onSubmit={e => { e.preventDefault(); if(settingsNewStaff.name.trim()){ setStaff([...staff, { id: Math.random().toString(), name: settingsNewStaff.name.trim(), position: normalizePosition(settingsNewStaff.position || '교사'), department: dept }]); setSettingsNewStaff({ name:'', position:'', department:'' }); } }} className="flex flex-col md:flex-row gap-4"><input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.position : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, position:e.target.value, department:dept})} placeholder="직위" className="md:w-48 border-2 rounded-2xl px-6 py-4 font-bold outline-none focus:border-blue-500"/><input type="text" value={settingsNewStaff.department === dept ? settingsNewStaff.name : ''} onChange={e => setSettingsNewStaff({...settingsNewStaff, name:e.target.value, department:dept})} placeholder="성명" className="flex-1 border-2 rounded-2xl px-6 py-4 font-bold outline-none focus:border-blue-500"/><button type="submit" className="bg-blue-600 text-white px-10 rounded-2xl font-black active:scale-95">등록</button></form></div>
                         <div className="px-8 py-5 bg-slate-50/50 border-b flex items-center gap-4"><input type="text" value={currentF.name} onChange={e => setDeptFilters({...deptFilters, [dept]: {...currentF, name: e.target.value}})} placeholder="이 부서에서 이름 검색" className="flex-1 bg-transparent font-bold outline-none border-b-2 border-transparent focus:border-blue-500 transition-all"/></div>
                         <ul className="divide-y-2">{staff.filter(s => s.department === dept).filter(s => s.name.includes(currentF.name)).map((s) => (<li key={s.id} className="px-10 py-6 flex justify-between items-center bg-white group hover:bg-slate-50/30 transition-colors">
                            <div className="flex items-center gap-8"><span className="w-32 text-center text-xs font-black text-blue-700 bg-blue-50 py-2.5 rounded-xl border-2 border-blue-100 uppercase tracking-tighter">{s.position}</span><span className="text-2xl font-bold text-slate-800">{s.name}</span></div>
                            <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => { setSettingsEditingStaffId(s.id); setSettingsEditStaffData({name:s.name, position:s.position}); }} className="p-3 text-slate-300 hover:text-blue-500"><i className="fa-solid fa-pen text-xl"></i></button><button onClick={() => setStaff(staff.filter(i=>i.id!==s.id))} className="p-3 text-slate-300 hover:text-red-500"><i className="fa-solid fa-trash-can text-xl"></i></button></div>
                         </li>))}</ul>
                       </div>)})}
                   </div>
                 </div>
              </div>
            )}
          </main>

          <div className="lg:hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-5 py-4 rounded-[3.5rem] shadow-2xl flex items-center gap-3 border border-slate-100 z-50 animate-in slide-in-from-bottom-8">
             {[
               {id:'calendar', icon:'fa-calendar-days'}, 
               {id:'list', icon:'fa-list'}, 
               {id:'organization', icon:'fa-building'}, 
               {id:'upload', icon:'fa-file-arrow-up'}, 
               {id:'settings', icon:'fa-gear'}
             ].map(item => (
               <button key={item.id} onClick={() => setViewMode(item.id)} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all ${viewMode === item.id ? 'bg-blue-600 text-white shadow-xl rotate-[360deg]' : 'text-slate-400'}`}>
                 <i className={`fa-solid ${item.icon} text-2xl`}></i>
               </button>
             ))}
             <div className="w-[2px] h-8 bg-slate-200 mx-2"></div>
             <button onClick={() => setIsModalOpen(true)} className="w-12 h-12 bg-slate-900 text-white flex items-center justify-center rounded-full shadow-2xl active:scale-75 transition-all"><i className="fa-solid fa-plus text-2xl"></i></button>
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 font-bold animate-in fade-in duration-200">
              <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onClick={() => setIsModalOpen(false)}></div>
              <div className="bg-white rounded-[3.5rem] shadow-2xl z-10 w-full max-w-2xl overflow-hidden animate-in zoom-in duration-300 border border-slate-100">
                <form onSubmit={handleSubmit}>
                  <div className="p-10 border-b-2 border-slate-50 flex justify-between items-center bg-slate-50/50"><h3 className="text-3xl font-black flex items-center gap-3 text-slate-800"><i className="fa-solid fa-plus text-3xl text-blue-600"></i>복무 수동 등록</h3><button type="button" onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-600"><i className="fa-solid fa-xmark text-3xl"></i></button></div>
                  <div className="p-10 lg:p-14 space-y-10 overflow-y-auto max-h-[70vh] hide-scrollbar font-bold">
                    <div className="space-y-4"><label className="text-base text-slate-400 uppercase ml-2">근무자 성명</label><input type="text" name="name" value={newEvent.name} onChange={handleInputChange} placeholder="성명을 입력하세요" required className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-black outline-none focus:border-blue-500 shadow-sm transition-all"/></div>
                    <div className="grid grid-cols-2 gap-8">
                      <div className="space-y-4"><label className="text-base text-slate-400 ml-2">복무 종류</label><select name="type" value={newEvent.type} onChange={handleInputChange} className="w-full border-2 rounded-[1.5rem] p-6 text-2xl font-black bg-white">{WORK_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      <div className="space-y-4"><label className="text-base text-slate-400 ml-2">해당 날짜</label><input type="date" name="date" value={newEvent.date} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-black focus:border-blue-500 transition-all"/></div>
                    </div>
                    <div className="flex gap-8">
                      <div className="flex-1 space-y-4"><label className="text-base text-slate-400 ml-2">시작 시간</label><input type="time" name="startTime" value={newEvent.startTime} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-black"/></div>
                      <div className="flex-1 space-y-4"><label className="text-base text-slate-400 ml-2">종료 시간</label><input type="time" name="endTime" value={newEvent.endTime} onChange={handleInputChange} className="w-full border-2 border-slate-100 rounded-[1.5rem] p-6 text-2xl font-black"/></div>
                    </div>
                    <div className="space-y-4">
                      <div className="flex justify-between items-center ml-2"><label className="text-base text-slate-400">구체적 사유</label><button type="button" onClick={async () => { if(!newEvent.details) return; setIsAiLoading(true); try { const res = await callGemini(`'${newEvent.details}' 사유를 나이스 행정용어로 다듬어줘. 결과만 짧게 한 줄로.`, "Terms expert."); setNewEvent(p => ({ ...p, details: res.replace(/['"]/g, "").trim() })); } catch(e) { showAlert(e.message); } finally { setIsAiLoading(false); } }} disabled={isAiLoading} className="text-sm font-black text-indigo-600 border-2 border-indigo-100 bg-indigo-50 px-5 py-2 rounded-2xl hover:bg-white transition-all shadow-sm flex items-center gap-2">{isAiLoading ? <i className="fa-solid fa-arrows-rotate animate-spin text-base"></i> : <i className="fa-solid fa-wand-magic-sparkles text-base"></i>}AI 교정</button></div>
                      <textarea rows="3" name="details" value={newEvent.details} onChange={handleInputChange} placeholder="사유를 입력하세요" className="w-full border-2 border-slate-100 rounded-[2rem] p-6 text-2xl font-black outline-none focus:border-blue-500 shadow-sm bg-white resize-none"/>
                    </div>
                  </div>
                  <div className="p-10 bg-slate-50/50 border-t-2 flex gap-6"><button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-6 border-2 border-slate-200 rounded-3xl font-black text-slate-400 hover:bg-white text-2xl">취소</button><button type="submit" className="flex-1 py-6 bg-blue-600 text-white rounded-3xl font-black shadow-2xl text-2xl active:scale-95 transition-all">복무 등록 완료</button></div>
                </form>
              </div>
            </div>
          )}

          {globalAlert.isOpen && <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 font-bold animate-in fade-in duration-200"><div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onClick={() => setGlobalAlert({isOpen: false, message: '', align: 'center'})}></div><div className="bg-white rounded-[4rem] shadow-2xl w-full max-w-lg p-12 border border-slate-50 relative animate-in zoom-in"><div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center mb-10 mx-auto shadow-inner"><i className="fa-solid fa-circle-exclamation text-5xl"></i></div><div className={`bg-slate-50/50 p-8 rounded-[2rem] border-2 border-slate-100 mb-12 font-bold text-2xl text-slate-700 leading-relaxed whitespace-pre-wrap ${globalAlert.align === 'left' ? 'text-left' : 'text-center'}`}>{globalAlert.message}</div><button onClick={() => setGlobalAlert({isOpen: false, message: '', align: 'center'})} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black shadow-2xl text-xl active:scale-95 transition-all">확인</button></div></div>}
          {globalConfirm.isOpen && <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 font-bold animate-in fade-in duration-200"><div className="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onClick={() => setGlobalConfirm({isOpen: false, message: '', onConfirm: null})}></div><div className="bg-white rounded-[4rem] shadow-2xl w-full max-w-lg p-12 text-center border border-slate-100 relative animate-in zoom-in"><div className="w-24 h-24 bg-orange-50 text-orange-600 rounded-[2.5rem] flex items-center justify-center mb-10 mx-auto shadow-inner"><i className="fa-solid fa-circle-question text-5xl text-orange-600"></i></div><div className="bg-slate-50/50 p-8 rounded-[2rem] border-2 border-slate-100 mb-12 font-bold text-2xl text-slate-700 leading-relaxed whitespace-pre-wrap">{globalConfirm.message}</div><div className="flex gap-4"><button onClick={() => setGlobalConfirm({isOpen: false, message: '', onConfirm: null})} className="flex-1 bg-slate-100 text-slate-500 py-6 rounded-[2.5rem] font-black text-xl active:scale-95 transition-all">취소</button><button onClick={() => { globalConfirm.onConfirm?.(); setGlobalConfirm({isOpen: false, message: '', onConfirm: null}); }} className="flex-1 bg-blue-600 text-white py-6 rounded-[2.5rem] font-black shadow-2xl hover:bg-blue-700 active:scale-95 transition-all text-xl">진행</button></div></div></div>}
        </div>
      );
    }

    function App() {
      return (
        <ErrorBoundary>
          <AppContent />
        </ErrorBoundary>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
